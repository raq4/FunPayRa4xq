<style>
:root {
    --bg:       #0c0808;
    --bg-panel: #161010;
    --bg-input: #201414;
    --bg-card:  #13121a;
    --accent:   #f28888;
    --glow:     rgba(242,136,136,.16);
    --muted:    #6e5e5e;
    --border:   rgba(242,136,136,.12);
    --text:     #f2eded;
    --green:    #4ade80;

*{box-sizing:border-box;margin:0;padding:0}

body{
    font-family:'Syne',sans-serif;
    background:var(--bg);
    background-image:radial-gradient(ellipse 90% 35% at 50% -5%,rgba(242,80,80,.07) 0%,transparent 65%);
    color:var(--text);
    padding:28px 18px 70px;
    min-height:100vh;
}

.wrap{max-width:1500px;margin:0 auto;display:flex;flex-direction:column;gap:20px}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;gap:12px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.hdr-icon{width:36px;height:36px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 20px var(--glow);flex-shrink:0}
.hdr-title{font-size:1.4rem;font-weight:800;letter-spacing:-.03em}
.hdr-title span{color:var(--accent)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.badge{font-family:'Space Mono',monospace;font-size:.65rem;padding:3px 9px;border-radius:20px;border:1px solid var(--border);color:var(--muted);white-space:nowrap}
.badge.live{color:var(--green);border-color:rgba(74,222,128,.3);background:var(--green-bg)}
.badge.fp{color:var(--accent);border-color:rgba(242,136,136,.35);background:rgba(242,136,136,.07);text-decoration:none;transition:background .2s}
.badge.fp:hover{background:rgba(242,136,136,.18)}

/* ── PANEL ── */
.panel{background:var(--bg-panel);border:1px solid var(--border);border-radius:16px;padding:16px 18px;display:flex;flex-direction:column;gap:12px}

.search-row{display:flex;gap:8px}
.search-row input{
    flex:1;background:var(--bg-input);border:1px solid var(--border);color:var(--text);
    padding:10px 14px;border-radius:10px;font-family:'Syne',sans-serif;font-size:.88rem;
    outline:none;transition:border-color .2s;
}
.search-row input:focus{border-color:var(--accent)}
.search-row input::placeholder{color:var(--muted)}

.btn{border:none;padding:0 16px;border-radius:10px;font-family:'Syne',sans-serif;font-weight:700;font-size:.8rem;cursor:pointer;transition:background .18s;white-space:nowrap}
.btn-reset{background:#7f1d1d;color:#ffcece;height:40px}
.btn-reset:hover{background:#991b1b}
.btn-reload{background:#132a1c;color:var(--green);border:1px solid rgba(74,222,128,.2);font-family:'Space Mono',monospace;font-size:.68rem;height:40px}
.btn-reload:hover{background:#173623}

/* ── FILTER GRID ── */
.fgrid{display:flex;flex-wrap:wrap;gap:10px 16px;align-items:center}
.fg{display:flex;align-items:center;gap:6px}
.fg label{font-family:'Space Mono',monospace;font-size:.65rem;color:var(--muted);white-space:nowrap}
.fg select{
    background:var(--bg-input);color:var(--text);border:1px solid var(--border);
    padding:7px 10px;border-radius:8px;font-family:'Syne',sans-serif;font-size:.8rem;
    outline:none;cursor:pointer;max-width:165px;
}
.fg select:focus{border-color:var(--accent)}

.slider-wrap{display:flex;align-items:center;gap:8px;flex-grow:1;max-width:320px}
.slider-wrap input[type=range]{flex:1;accent-color:var(--accent);cursor:pointer}
.price-lbl{font-family:'Space Mono',monospace;font-size:.8rem;color:var(--accent);font-weight:700;white-space:nowrap;min-width:82px}

/* ── CHIPS ── */
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{
    display:inline-flex;align-items:center;gap:5px;
    background:rgba(242,136,136,.09);border:1px solid rgba(242,136,136,.22);
    color:var(--accent);font-family:'Space Mono',monospace;font-size:.61rem;
    padding:3px 9px 3px 10px;border-radius:20px;cursor:pointer;transition:background .15s;
}
.chip:hover{background:rgba(242,136,136,.2)}
.chip .x{opacity:.65;margin-left:2px}

/* ── STATUS ── */
.status-bar{display:flex;align-items:center;gap:10px}
#spinner{width:13px;height:13px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .65s linear infinite;display:none;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.status-txt{font-family:'Space Mono',monospace;font-size:.72rem;color:var(--muted)}

/* ── GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:16px}

/* ── CARD ── */
.card{
    border:1.5px solid var(--accent);border-radius:18px;overflow:hidden;
    display:flex;flex-direction:column;position:relative;
    text-decoration:none;color:inherit;background:var(--bg-card);
    aspect-ratio:1/1.3;transition:transform .17s,box-shadow .17s;
}
.card:hover{transform:translateY(-4px) scale(1.015);box-shadow:0 8px 28px rgba(242,100,100,.18)}

.c-num{
    position:absolute;top:8px;right:8px;
    background:rgba(0,0,0,.55);backdrop-filter:blur(6px);
    color:#fff;font-family:'Space Mono',monospace;font-size:.62rem;
    padding:2px 7px;border-radius:20px;z-index:3;
}
.c-live{
    position:absolute;top:8px;left:8px;
    background:var(--green-bg);border:1px solid rgba(74,222,128,.3);
    color:var(--green);font-family:'Space Mono',monospace;font-size:.58rem;
    padding:2px 7px;border-radius:20px;z-index:3;
}

.c-img{width:100%;height:62%;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.c-img::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,.3) 100%);pointer-events:none;z-index:2}
.c-img img{max-width:70%;max-height:70%;object-fit:contain;z-index:1;opacity:0;transition:opacity .25s,transform .3s}
.c-img img.ok{opacity:1}
.card:hover .c-img img{transform:scale(1.07)}

.c-body{flex:1;padding:10px 13px 12px;display:flex;flex-direction:column;justify-content:space-between;border-top:1px solid rgba(255,255,255,.04)}
.c-name{font-size:.93rem;font-weight:800;letter-spacing:-.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-meta{font-family:'Space Mono',monospace;font-size:.59rem;color:#5a4f4f;line-height:1.6;margin-top:3px}
.c-price{font-family:'Space Mono',monospace;font-size:1.05rem;font-weight:700;color:var(--accent);margin-top:5px}
.c-ton{font-family:'Space Mono',monospace;font-size:.6rem;color:var(--muted);margin-top:1px}

.empty{grid-column:1/-1;text-align:center;padding:60px 20px;font-family:'Space Mono',monospace;font-size:.8rem;color:var(--muted)}

/* ── FOOTER ── */
.footer{text-align:center;padding-top:10px;border-top:1px solid var(--border);font-family:'Space Mono',monospace;font-size:.67rem;color:var(--muted);line-height:1.8}
.footer a{color:var(--accent);text-decoration:none}
.footer a:hover{text-decoration:underline}
</style>

    status:document.getElementById('status'),
    spin:  document.getElementById('spinner'),
    srcBadge:document.getElementById('src-badge'),
    reload:document.getElementById('btn-reload'),
    reset: document.getElementById('btn-reset'),
};

/* ═══════════════  PRICE  ══════════════ */
function rubPrice(ton) {
    const r = Math.ceil(ton * CFG.TON_RATE * CFG.MARKUP);
    return r < CFG.MIN_RUB ? CFG.MIN_RUB : r;
}
const fmtRub = n => n.toLocaleString('ru-RU') + ' ₽';
const fmtTon = n => n.toFixed(2) + ' TON';

/* ═══════════════  IMAGE  ══════════════ */
function imgSrc(item) {
    if (item.photo_url) return item.photo_url;
    const slug = item.id.replace(/-/g,'');
    return item.num
        ? `https://nft.fragment.com/gift/${slug}-${item.num}.large.jpg`
        : `https://nft.fragment.com/gift/${slug}.large.jpg`;
}
function fallback(img, id) {
    const slug = id.replace(/-/g,'');
    img.onerror = null;
    img.src = `https://nft.fragment.com/gift/${slug}.large.jpg`;
    img.onerror = () => {
        img.onerror = null;
        img.style.opacity = '.15';
        img.src = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1 1"><rect fill="%23222" width="1" height="1"/></svg>';
    };
}

/* ═══════════════  DROPDOWNS  ══════════════ */
function uniq(arr) { return [...new Set(arr.filter(Boolean))].sort((a,b)=>a.localeCompare(b,'ru')); }

function fillSel(sel, vals, allLabel) {
    const prev = sel.value;
    sel.innerHTML = `<option value="">${allLabel}</option>`;
    vals.forEach(v => { const o = document.createElement('option'); o.value = o.textContent = v; sel.appendChild(o); });
    if ([...sel.options].some(o => o.value === prev)) sel.value = prev;
}

function rebuildDropdowns() {
    const it = S.items;
    fillSel(el.fColl,  uniq(it.map(i=>i.name)),     'Все коллекции');
    fillSel(el.fModel, uniq(it.map(i=>i.model)),    'Все модели');
    fillSel(el.fBack,  uniq(it.map(i=>i.backdrop)), 'Все фоны');
    fillSel(el.fSym,   uniq(it.map(i=>i.symbol).filter(s=>s)), 'Все символы');
}

/* ═══════════════  CHIPS  ══════════════ */
const CHIP_DEFS = [
    {label:'Коллекция', sel:()=>el.fColl},
    {label:'Модель',    sel:()=>el.fModel},
    {label:'Фон',       sel:()=>el.fBack},
    {label:'Символ',    sel:()=>el.fSym},
];
function buildChips() {
    el.chips.innerHTML = '';
    CHIP_DEFS.forEach(d => {
        const s = d.sel();
        if (!s.value) return;
        const c = document.createElement('span');
        c.className = 'chip';
        c.innerHTML = `${d.label}: ${s.value} <span class="x">✕</span>`;
        c.addEventListener('click', () => { s.value = ''; apply(); });
        el.chips.appendChild(c);
    });
}

/* ═══════════════  APPLY  ══════════════ */
function initSlider() {
    const max = Math.max(...S.items.map(i=>rubPrice(i.ton)), CFG.MIN_RUB);
    el.fPrice.max = max; el.fPrice.value = max;
    el.pval.textContent = max.toLocaleString('ru-RU');
}

function apply() {
    const q    = el.q.value.toLowerCase().trim();
    const coll = el.fColl.value, model = el.fModel.value;
    const back = el.fBack.value, sym   = el.fSym.value;
    const maxP = parseInt(el.fPrice.value);
    const asc  = el.fSort.value === 'asc';

    let res = S.items.filter(i => {
        if (i.ton > CFG.MAX_TON)             return false;
        if (rubPrice(i.ton) > maxP)          return false;
        if (q     && !i.name.toLowerCase().includes(q)) return false;
        if (coll  && i.name     !== coll)    return false;
        if (model && i.model    !== model)   return false;
        if (back  && i.backdrop !== back)    return false;
        if (sym   && i.symbol   !== sym)     return false;
        return true;
    });
    res.sort((a,b) => { const d = rubPrice(a.ton)-rubPrice(b.ton); return asc?d:-d; });

    buildChips();
    render(res);
}

/* ═══════════════  RENDER  ══════════════ */
function render(data) {
    el.grid.innerHTML = '';
    el.status.textContent = `Показано: ${data.length} подарков`;
    if (!data.length) {
        el.grid.innerHTML = '<div class="empty">Ничего не найдено — попробуйте изменить фильтры</div>';
        return;
    }
    const frag = document.createDocumentFragment();
    data.forEach(item => {
        const rub  = rubPrice(item.ton);
        const href = item.isLive && item.portalUrl ? item.portalUrl : CFG.FUNPAY;
        const a = document.createElement('a');
        a.href = href; a.target = '_blank'; a.rel = 'noopener noreferrer'; a.className = 'card';
        a.innerHTML = `
            ${item.isLive?'<div class="c-live">LIVE</div>':''}
            <div class="c-num">#${item.num||'—'}</div>
            <div class="c-img" style="background:${item.bg||'#1a1a2e'}">
                <img src="${imgSrc(item)}" alt="${item.name}" loading="lazy">
            </div>
            <div class="c-body">
                <div>
                    <div class="c-name">${item.name}</div>
                    <div class="c-meta">
                        модель · ${item.model}<br>
                        фон · ${item.backdrop}${item.symbol?`<br>символ · ${item.symbol}`:''}
                    </div>
                </div>
                <div>
                    <div class="c-price">${fmtRub(rub)}</div>
                    <div class="c-ton">${fmtTon(item.ton)}</div>
                </div>
            </div>`;
        const img = a.querySelector('img');
        img.onload  = () => img.classList.add('ok');
        img.onerror = () => fallback(img, item.id);
        frag.appendChild(a);
    });
    el.grid.appendChild(frag);
}

/* ═══════════════  PORTALS FETCH  ══════════════ */
function setLoading(v) { el.spin.style.display = v?'block':'none'; }

function normalizePortals(raw) {
    return raw.map(item => {
        const ton = parseFloat(item.price || item.ton_price || 0);
        if (!ton || ton > CFG.MAX_TON) return null;
        const attrs    = item.attributes || [];
        const model    = attrs.find(a=>a.type==='model')   ?.value || 'Standard';
        const backdrop = attrs.find(a=>a.type==='backdrop') ?.value || 'Default';
        const symbol   = attrs.find(a=>a.type==='symbol')   ?.value || '';
        const id = (item.name||'gift').toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
        return {
            id, name:item.name||'Unknown',
            num:String(item.external_collection_number||item.tg_id||''),
            model, backdrop, symbol,
            bg: item.backdrop_color||null, ton,
            photo_url: item.photo_url||null, isLive:true,
            portalUrl: item.id?`https://portals.tg/nft/${item.id}`:null,
        };
    }).filter(Boolean);
}

async function fetchPortals() {
    setLoading(true);
    el.srcBadge.textContent='⏳ Portals…'; el.srcBadge.className='badge';
    const urls = [
        `${CFG.P_SEARCH}?sort=price_asc&limit=200&max_price=${CFG.MAX_TON}`,
        `${CFG.PROXY}${encodeURIComponent(CFG.P_SEARCH+'?sort=price_asc&limit=200&max_price='+CFG.MAX_TON)}`,
        `${CFG.PROXY}${encodeURIComponent(CFG.P_ALT+'?sort=price_asc&limit=200&max_price='+CFG.MAX_TON)}`,
    ];
    for (const url of urls) {
        try {
            const r = await fetch(url,{signal:AbortSignal.timeout(7000)});
            if(!r.ok) continue;
            const data = await r.json();
            const raw  = Array.isArray(data)?data:(data.items||data.gifts||data.results||[]);
            if(!raw.length) continue;
            S.items  = normalizePortals(raw);
            S.isLive = true;
            el.srcBadge.textContent=`✅ Portals · ${S.items.length} лотов`;
            el.srcBadge.className='badge live';
            setLoading(false); return;
        } catch(_){}
    }
    // fallback
    S.items=LOCAL; S.isLive=false;
    el.srcBadge.textContent='📦 локальные данные';
    el.srcBadge.className='badge';
    setLoading(false);
}

/* ═══════════════  INIT  ══════════════ */
async function init() {
    await fetchPortals();
    rebuildDropdowns();
    initSlider();
    apply();

    el.fPrice.addEventListener('input', ()=>{
        el.pval.textContent=parseInt(el.fPrice.value).toLocaleString('ru-RU');
    });
    el.fPrice.addEventListener('change', apply);
    [el.q, el.fColl, el.fModel, el.fBack, el.fSym, el.fSort].forEach(e=>{
        e.addEventListener('input',  apply);
        e.addEventListener('change', apply);
    });

    el.reset.addEventListener('click', ()=>{
        el.q.value=''; el.fColl.value=''; el.fModel.value='';
        el.fBack.value=''; el.fSym.value=''; el.fSort.value='asc';
        el.fPrice.value=el.fPrice.max;
        el.pval.textContent=parseInt(el.fPrice.max).toLocaleString('ru-RU');
        apply();
    });
    el.reload.addEventListener('click', async ()=>{
        S.isLive=false;
        await fetchPortals();
        rebuildDropdowns();
        initSlider();
        apply();
    });
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
