<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telegram Gifts — FunPay</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0808;--bg-panel:#161010;--bg-input:#201414;--bg-card:#13121a;--accent:#f28888;--glow:rgba(242,136,136,.16);--muted:#6e5e5e;--border:rgba(242,136,136,.12);--text:#f2eded;--green:#4ade80;--green-bg:rgba(74,222,128,.1)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Syne',sans-serif;background:var(--bg);background-image:radial-gradient(ellipse 90% 35% at 50% -5%,rgba(242,80,80,.07) 0%,transparent 65%);color:var(--text);padding:24px 16px 60px;min-height:100vh}
.wrap{max-width:1500px;margin:0 auto;display:flex;flex-direction:column;gap:18px}
.hdr{display:flex;align-items:center;gap:12px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.hdr-icon{width:36px;height:36px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 20px var(--glow);flex-shrink:0}
.hdr-title{font-size:1.4rem;font-weight:800;letter-spacing:-.03em}
.hdr-title span{color:var(--accent)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.badge{font-family:'Space Mono',monospace;font-size:.65rem;padding:3px 9px;border-radius:20px;border:1px solid var(--border);color:var(--muted);white-space:nowrap}
.badge.live{color:var(--green);border-color:rgba(74,222,128,.3);background:var(--green-bg)}
.badge.fp{color:var(--accent);border-color:rgba(242,136,136,.35);background:rgba(242,136,136,.07);text-decoration:none;transition:background .2s}
.badge.fp:hover{background:rgba(242,136,136,.18)}
.panel{background:var(--bg-panel);border:1px solid var(--border);border-radius:16px;padding:16px 18px;display:flex;flex-direction:column;gap:12px}
.search-row{display:flex;gap:8px}
.search-row input{flex:1;background:var(--bg-input);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:10px;font-family:'Syne',sans-serif;font-size:.88rem;outline:none;transition:border-color .2s}
.search-row input:focus{border-color:var(--accent)}
.search-row input::placeholder{color:var(--muted)}
.btn{border:none;padding:0 16px;border-radius:10px;font-family:'Syne',sans-serif;font-weight:700;font-size:.8rem;cursor:pointer;transition:background .18s;white-space:nowrap;height:40px}
.btn-reset{background:#7f1d1d;color:#ffcece}
.btn-reset:hover{background:#991b1b}
.fgrid{display:flex;flex-wrap:wrap;gap:10px 16px;align-items:center}
.fg{display:flex;align-items:center;gap:6px}
.fg label{font-family:'Space Mono',monospace;font-size:.65rem;color:var(--muted);white-space:nowrap}
.fg select{background:var(--bg-input);color:var(--text);border:1px solid var(--border);padding:7px 10px;border-radius:8px;font-family:'Syne',sans-serif;font-size:.8rem;outline:none;cursor:pointer;max-width:180px}
.fg select:focus{border-color:var(--accent)}
.slider-wrap{display:flex;align-items:center;gap:8px;flex-grow:1;max-width:320px}
.slider-wrap input[type=range]{flex:1;accent-color:var(--accent);cursor:pointer}
.price-lbl{font-family:'Space Mono',monospace;font-size:.8rem;color:var(--accent);font-weight:700;white-space:nowrap;min-width:90px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{display:inline-flex;align-items:center;gap:5px;background:rgba(242,136,136,.09);border:1px solid rgba(242,136,136,.22);color:var(--accent);font-family:'Space Mono',monospace;font-size:.61rem;padding:3px 9px 3px 10px;border-radius:20px;cursor:pointer;transition:background .15s}
.chip:hover{background:rgba(242,136,136,.2)}
.status-bar{display:flex;align-items:center;gap:10px}
#spinner{width:13px;height:13px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .65s linear infinite;display:none;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.status-txt{font-family:'Space Mono',monospace;font-size:.72rem;color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:16px}
.card{border:1.5px solid var(--accent);border-radius:18px;overflow:hidden;display:flex;flex-direction:column;position:relative;text-decoration:none;color:inherit;background:var(--bg-card);aspect-ratio:1/1.3;transition:transform .17s,box-shadow .17s}
.card:hover{transform:translateY(-4px) scale(1.015);box-shadow:0 8px 28px rgba(242,100,100,.18)}
.c-num{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);color:#fff;font-family:'Space Mono',monospace;font-size:.62rem;padding:2px 7px;border-radius:20px;z-index:3}
.c-img{width:100%;height:62%;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;background:#1a1a2e}
.c-img::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,.25) 100%);pointer-events:none;z-index:2}
.c-img img{max-width:75%;max-height:75%;object-fit:contain;z-index:1;opacity:0;transition:opacity .3s,transform .3s}
.c-img img.ok{opacity:1}
.card:hover .c-img img{transform:scale(1.07)}
.c-body{flex:1;padding:10px 13px 12px;display:flex;flex-direction:column;justify-content:space-between;border-top:1px solid rgba(255,255,255,.04)}
.c-name{font-size:.93rem;font-weight:800;letter-spacing:-.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-meta{font-family:'Space Mono',monospace;font-size:.58rem;color:#5a4f4f;line-height:1.6;margin-top:3px}
.c-price{font-family:'Space Mono',monospace;font-size:1.05rem;font-weight:700;color:var(--accent);margin-top:5px}
.c-ton{font-family:'Space Mono',monospace;font-size:.6rem;color:var(--muted);margin-top:1px}
.empty{grid-column:1/-1;text-align:center;padding:60px 20px;font-family:'Space Mono',monospace;font-size:.8rem;color:var(--muted)}
.footer{text-align:center;padding-top:10px;border-top:1px solid var(--border);font-family:'Space Mono',monospace;font-size:.67rem;color:var(--muted);line-height:1.8}
.footer a{color:var(--accent);text-decoration:none}
.footer a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="wrap">
<header class="hdr">
  <div class="hdr-icon">&#127873;</div>
  <div class="hdr-title">Gift<span>Market</span></div>
  <div class="hdr-right">
    <span id="src-badge" class="badge">&#9203; загрузка&#8230;</span>
    <a href="https://funpay.com/users/13409860/" target="_blank" rel="noopener" class="badge fp">&#128722; FunPay</a>
  </div>
</header>
<section class="panel">
  <div class="search-row">
    <input type="text" id="q" placeholder="Поиск по названию&#8230;">
    <button class="btn btn-reset" id="btn-reset">Сбросить</button>
  </div>
  <div class="fgrid">
    <div class="fg"><label>Коллекция</label><select id="f-coll"><option value="">Все</option></select></div>
    <div class="fg"><label>Модель</label><select id="f-model"><option value="">Все</option></select></div>
    <div class="fg"><label>Фон</label><select id="f-back"><option value="">Все</option></select></div>
    <div class="fg"><label>Символ</label><select id="f-sym"><option value="">Все</option></select></div>
    <div class="fg"><label>Сортировка</label><select id="f-sort"><option value="asc">Дешевле</option><option value="desc">Дороже</option></select></div>
    <div class="fg slider-wrap">
      <label>до</label>
      <input type="range" id="f-price" min="0" max="999999" step="100" value="999999">
      <span class="price-lbl"><span id="pval">&#8212;</span> &#8381;</span>
    </div>
  </div>
  <div class="chips" id="chips"></div>
</section>
<div class="status-bar">
  <div id="spinner"></div>
  <span class="status-txt" id="status">Загрузка&#8230;</span>
</div>
<main class="grid" id="grid"></main>
<footer class="footer">
  Продавец: <a href="https://funpay.com/users/13409860/" target="_blank" rel="noopener">funpay.com/users/13409860</a>
</footer>
</div>
<script>
var FUNPAY='https://funpay.com/users/13409860/';
var MARKUP=1.35,MIN_RUB=600,RATE=138.5;
var ALL=[];
function rub(ton){var r=Math.ceil(ton*RATE*MARKUP);return r<MIN_RUB?MIN_RUB:r;}
function fR(n){return n.toLocaleString('ru-RU')+' \u20bd';}
function fT(n){return(+n).toFixed(2)+' TON';}
function norm(r){
  var ton=parseFloat(r.price||0);
  if(!ton)return null;
  var attrs=r.attributes||[];
  function ga(t){for(var i=0;i<attrs.length;i++)if(attrs[i].type===t)return attrs[i].value||'';return '';}
  var tg=String(r.tg_id||'');
  var num=r.external_collection_number||tg.replace(/\D/g,'')||'';
  var slug=(r.name||'').toLowerCase().replace(/[^a-z0-9]/g,'');
  var photo=r.photo_url||('https://nft.fragment.com/gift/'+slug+'-'+num+'.medium.jpg');
  var url=r.id?('https://portals.tg/nft/'+r.id):FUNPAY;
  return{name:r.name||'?',num:String(num),model:ga('model'),backdrop:ga('backdrop'),symbol:ga('symbol'),ton:ton,photo:photo,slug:slug,url:url};
}
function load(){
  spin(1);bdg('\u23f3 загрузка\u2026','');
  var xhr=new XMLHttpRequest();
  xhr.open('GET','./market_data.json?t='+Date.now());
  xhr.onload=function(){
    if(xhr.status!==200){bdg('\u274c HTTP '+xhr.status,'');spin(0);return;}
    var data;
    try{data=JSON.parse(xhr.responseText);}catch(e){bdg('\u274c JSON error','');spin(0);return;}
    var raw=Array.isArray(data)?data:(data.results||data.items||data.gifts||[]);
    ALL=[];
    for(var i=0;i<raw.length;i++){var n=norm(raw[i]);if(n)ALL.push(n);}
    bdg('\u2705 '+ALL.length+' подарков','live');
    buildDD();initSl();apply();spin(0);
  };
  xhr.onerror=function(){bdg('\u274c ошибка','');spin(0);};
  xhr.send();
}
function uniq(a){var s={},r=[];for(var i=0;i<a.length;i++)if(a[i]&&!s[a[i]]){s[a[i]]=1;r.push(a[i]);}r.sort(function(a,b){return a.localeCompare(b,'ru');});return r;}
function fillSel(id,vals){
  var s=document.getElementById(id),p=s.value;
  s.innerHTML='<option value="">Все</option>';
  for(var i=0;i<vals.length;i++){var o=document.createElement('option');o.value=o.textContent=vals[i];s.appendChild(o);}
  for(var i=0;i<s.options.length;i++)if(s.options[i].value===p){s.value=p;break;}
}
function buildDD(){
  var names=[],models=[],backs=[],syms=[];
  for(var i=0;i<ALL.length;i++){names.push(ALL[i].name);models.push(ALL[i].model);backs.push(ALL[i].backdrop);if(ALL[i].symbol)syms.push(ALL[i].symbol);}
  fillSel('f-coll',uniq(names));fillSel('f-model',uniq(models));fillSel('f-back',uniq(backs));fillSel('f-sym',uniq(syms));
}
function initSl(){
  var max=MIN_RUB;
  for(var i=0;i<ALL.length;i++){var r=rub(ALL[i].ton);if(r>max)max=r;}
  var sl=document.getElementById('f-price');
  sl.max=max;sl.value=max;
  document.getElementById('pval').textContent=max.toLocaleString('ru-RU');
}
var CDEFS=[
  {l:'Коллекция',id:'f-coll'},
  {l:'Модель',id:'f-model'},
  {l:'Фон',id:'f-back'},
  {l:'Символ',id:'f-sym'}
];
function buildChips(){
  var b=document.getElementById('chips');b.innerHTML='';
  for(var i=0;i<CDEFS.length;i++){
    var d=CDEFS[i],s=document.getElementById(d.id);
    if(!s.value)continue;
    var c=document.createElement('span');c.className='chip';
    c.innerHTML=d.l+': '+s.value+' <span style="opacity:.6">\u2715</span>';
    (function(sid){c.onclick=function(){document.getElementById(sid).value='';apply();};})(d.id);
    b.appendChild(c);
  }
}
function apply(){
  var q=document.getElementById('q').value.toLowerCase().trim();
  var coll=document.getElementById('f-coll').value;
  var model=document.getElementById('f-model').value;
  var back=document.getElementById('f-back').value;
  var sym=document.getElementById('f-sym').value;
  var maxP=parseInt(document.getElementById('f-price').value)||999999;
  var asc=document.getElementById('f-sort').value==='asc';
  var res=[];
  for(var i=0;i<ALL.length;i++){
    var it=ALL[i];
    if(rub(it.ton)>maxP)continue;
    if(q&&it.name.toLowerCase().indexOf(q)===-1)continue;
    if(coll&&it.name!==coll)continue;
    if(model&&it.model!==model)continue;
    if(back&&it.backdrop!==back)continue;
    if(sym&&it.symbol!==sym)continue;
    res.push(it);
  }
  res.sort(function(a,b){var d=rub(a.ton)-rub(b.ton);return asc?d:-d;});
  buildChips();renderG(res);
}
function renderG(data){
  var g=document.getElementById('grid');g.innerHTML='';
  document.getElementById('status').textContent='Показано: '+data.length+' подарков';
  if(!data.length){g.innerHTML='<div class="empty">Ничего не найдено</div>';return;}
  var fr=document.createDocumentFragment();
  for(var i=0;i<data.length;i++){
    var it=data[i];
    var a=document.createElement('a');
    a.href=it.url;a.target='_blank';a.rel='noopener noreferrer';a.className='card';
    var meta='';
    if(it.model)meta+='модель · '+it.model+'<br>';
    if(it.backdrop)meta+='фон · '+it.backdrop;
    if(it.symbol)meta+='<br>символ · '+it.symbol;
    a.innerHTML='<div class="c-num">#'+(it.num||'&mdash;')+'</div>'+
      '<div class="c-img"><img src="'+it.photo+'" alt="'+it.name+'" loading="lazy"></div>'+
      '<div class="c-body"><div><div class="c-name">'+it.name+'</div><div class="c-meta">'+meta+'</div></div>'+
      '<div><div class="c-price">'+fR(rub(it.ton))+'</div><div class="c-ton">'+fT(it.ton)+'</div></div></div>';
    var img=a.querySelector('img');
    (function(slug){
      img.onload=function(){img.classList.add('ok');};
      img.onerror=function(){if(!img._t){img._t=1;img.src='https://nft.fragment.com/gift/'+slug+'.medium.jpg';}else{img.style.opacity='.1';}};
    })(it.slug);
    fr.appendChild(a);
  }
  g.appendChild(fr);
}
function spin(v){document.getElementById('spinner').style.display=v?'block':'none';}
function bdg(t,c){var b=document.getElementById('src-badge');b.textContent=t;b.className='badge'+(c?' '+c:'');}
document.getElementById('f-price').addEventListener('input',function(e){
  document.getElementById('pval').textContent=parseInt(e.target.value).toLocaleString('ru-RU');
});
document.getElementById('f-price').addEventListener('change',apply);
var ids=['q','f-coll','f-model','f-back','f-sym','f-sort'];
for(var _i=0;_i<ids.length;_i++){
  (function(id){
    var el=document.getElementById(id);
    el.addEventListener('input',apply);
    el.addEventListener('change',apply);
  })(ids[_i]);
}
document.getElementById('btn-reset').addEventListener('click',function(){
  document.getElementById('q').value='';
  var fs=['f-coll','f-model','f-back','f-sym'];
  for(var i=0;i<fs.length;i++)document.getElementById(fs[i]).value='';
  document.getElementById('f-sort').value='asc';
  var sl=document.getElementById('f-price');
  sl.value=sl.max;
  document.getElementById('pval').textContent=parseInt(sl.max).toLocaleString('ru-RU');
  apply();
});
load();
</script>
</body>
</html>
