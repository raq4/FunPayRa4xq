<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portals Showcase — Gifts Only</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --accent: #38bdf8;
            --accent-hover: #7dd3fc;
            --success: #4ade80;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--accent), #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .rate-badge {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .rate-badge span {
            color: var(--success);
        }

        .filter-panel {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .search-bar {
            display: flex;
            gap: 12px;
        }

        .search-bar input {
            flex: 1;
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-bar input:focus {
            border-color: var(--accent);
        }

        .btn-clear {
            background-color: #dc2626;
            color: #ffffff;
            border: none;
            padding: 0 24px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-clear:hover {
            background-color: #b91c1c;
        }

        .slider-wrapper {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .slider-outputs {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .slider-outputs span span {
            color: var(--accent);
            font-weight: 700;
        }

        .filter-group input[type="range"] {
            width: 100%;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .status-text {
            font-size: 1rem;
            color: var(--text-muted);
        }

        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px;
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(56, 189, 248, 0.12);
        }

        .img-container {
            width: 100%;
            padding-top: 100%;
            position: relative;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.05) 0%, rgba(0,0,0,0) 70%);
        }

        .img-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 16px;
        }

        .card-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .type-badge {
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--accent);
            background-color: rgba(56, 189, 248, 0.1);
            padding: 4px 8px;
            border-radius: 6px;
            align-self: flex-start;
            margin-bottom: 12px;
        }

        .item-title {
            font-size: 1.15rem;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 16px;
            min-height: 2.8rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .price-row {
            margin-top: auto;
            margin-bottom: 16px;
        }

        .price-rub {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--success);
        }

        .price-ton {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .btn-buy {
            display: block;
            width: 100%;
            background-color: var(--accent);
            color: #0f172a;
            text-align: center;
            padding: 14px 0;
            border-radius: 10px;
            font-weight: 700;
            text-decoration: none;
            font-size: 1rem;
            transition: background-color 0.2s;
        }

        .btn-buy:hover {
            background-color: var(--accent-hover);
        }

        .state-container {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
            font-size: 1.2rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Portals Showcase</h1>
            <div class="rate-badge">Курс TON (Bitget): <span id="ton-rate-val">138.5 ₽</span></div>
        </header>

        <section class="filter-panel">
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Введите название подарка для мгновенного поиска...">
                <button class="btn-clear" id="btn-reset-all">Сбросить всё</button>
            </div>

            <div class="filter-group slider-wrapper">
                <div class="slider-outputs">
                    <label>Фильтр по цене</label>
                    <span>до: <span id="price-limit-val">0</span> ₽</span>
                </div>
                <input type="range" id="price-range" min="0" max="10000" step="1">
            </div>
        </section>

        <div class="status-text" id="counter-text">Инициализация витрины...</div>

        <main class="catalog-grid" id="catalog-view">
            <div class="state-container">Загрузка подарков...</div>
        </main>
    </div>

    <script>
        const CONFIG = {
            FUNPAY_PROFILE: "https://funpay.com/users/13409860/",
            MARKUP_FACTOR: 1.35, // Наценка 35%
            TON_RATE: 138.5      // Точный зафиксированный курс с Bitget
        };

        // База данных исключительно по подаркам (GIFT) из Portals
        const LOCAL_DATA = [
            { id: "g1", name: "Red Velvet Gift Chest", tonPrice: 2.5, type: "GIFT", image: "https://api.portals.to/v1/items/red_velvet_gift/image" },
            { id: "g2", name: "Premium Golden Wrap", tonPrice: 5.0, type: "GIFT", image: "https://api.portals.to/v1/items/golden_wrap/image" },
            { id: "g3", name: "Cyberpunk Holo Box", tonPrice: 12.0, type: "GIFT", image: "https://api.portals.to/v1/items/cyber_box/image" },
            { id: "g4", name: "Classic New Year Present", tonPrice: 1.8, type: "GIFT", image: "https://api.portals.to/v1/items/ny_present/image" },
            { id: "g5", name: "Diamond Jubilee Package", tonPrice: 25.0, type: "GIFT", image: "https://api.portals.to/v1/items/diamond_package/image" },
            { id: "g6", name: "Frozen Ice Crystal Gift", tonPrice: 3.7, type: "GIFT", image: "https://api.portals.to/v1/items/frozen_gift/image" },
            { id: "g7", name: "Steampunk Brass Case", tonPrice: 7.2, type: "GIFT", image: "https://api.portals.to/v1/items/steampunk_case/image" },
            { id: "g8", name: "Royal Amethyst Parcel", tonPrice: 15.5, type: "GIFT", image: "" },
            { id: "g9", name: "Shadow Obsidian Relic", tonPrice: 30.0, type: "GIFT", image: "" }
        ];

        let APP_STATE = {
            rawItems: LOCAL_DATA,
            minCalculatedPrice: 0,
            maxCalculatedPrice: 0
        };

        const domCatalog = document.getElementById('catalog-view');
        const domCounter = document.getElementById('counter-text');
        const domSearch = document.getElementById('search-input');
        const domPriceRange = document.getElementById('price-range');
        const domPriceLimitVal = document.getElementById('price-limit-val');
        const domReset = document.getElementById('btn-reset-all');

        function initApp() {
            calibratePriceSlider();
            executeFiltering();

            domSearch.addEventListener('input', executeFiltering);
            domPriceRange.addEventListener('input', handleSliderMovement);
            domPriceRange.addEventListener('change', executeFiltering);
            domReset.addEventListener('click', clearFormFilters);
        }

        function calibratePriceSlider() {
            const calculatedPrices = APP_STATE.rawItems.map(item => 
                Math.ceil((item.tonPrice * CONFIG.TON_RATE) * CONFIG.MARKUP_FACTOR)
            );

            APP_STATE.minCalculatedPrice = Math.min(...calculatedPrices);
            APP_STATE.maxCalculatedPrice = Math.max(...calculatedPrices);

            domPriceRange.min = APP_STATE.minCalculatedPrice;
            domPriceRange.max = APP_STATE.maxCalculatedPrice;
            domPriceRange.value = APP_STATE.maxCalculatedPrice;
            domPriceLimitVal.textContent = APP_STATE.maxCalculatedPrice.toLocaleString('ru-RU');
        }

        function handleSliderMovement() {
            domPriceLimitVal.textContent = parseInt(domPriceRange.value).toLocaleString('ru-RU');
        }

        function executeFiltering() {
            const query = domSearch.value.toLowerCase().trim();
            const chosenMaxPrice = parseInt(domPriceRange.value);

            const filteredDataSet = APP_STATE.rawItems.filter(item => {
                const finalRubPrice = Math.ceil((item.tonPrice * CONFIG.TON_RATE) * CONFIG.MARKUP_FACTOR);
                
                const matchQuery = !query || item.name.toLowerCase().includes(query);
                const matchPrice = finalRubPrice <= chosenMaxPrice;

                return matchQuery && matchPrice;
            });

            renderShowcaseView(filteredDataSet);
        }

        function renderShowcaseView(dataset) {
            domCatalog.innerHTML = '';
            domCounter.textContent = `Всего подарков найдено: ${dataset.length}`;

            if (dataset.length === 0) {
                domCatalog.innerHTML = `
                    <div class="state-container">
                        Подарков с такими критериями цены или названия не найдено.
                    </div>`;
                return;
            }

            dataset.forEach(item => {
                const finalRubPrice = Math.ceil((item.tonPrice * CONFIG.TON_RATE) * CONFIG.MARKUP_FACTOR);

                const cardNode = document.createElement('div');
                cardNode.className = 'card';
                cardNode.innerHTML = `
                    <div class="img-container">
                        <img src="${item.image || 'https://placehold.co/400x400/1e293b/f8fafc?text=GIFT'}" alt="${item.name}" loading="lazy">
                    </div>
                    <div class="card-content">
                        <div class="type-badge">${item.type}</div>
                        <div class="item-title">${item.name}</div>
                        <div class="price-row">
                            <div class="price-rub">${finalRubPrice.toLocaleString('ru-RU')} ₽</div>
                            <div class="price-ton">База: ${item.tonPrice} TON</div>
                        </div>
                        <a href="${CONFIG.FUNPAY_PROFILE}" target="_blank" class="btn-buy">Купить на FunPay</a>
                    </div>
                `;
                domCatalog.appendChild(cardNode);
            });
        }

        function clearFormFilters() {
            domSearch.value = '';
            domPriceRange.value = APP_STATE.maxCalculatedPrice;
            domPriceLimitVal.textContent = APP_STATE.maxCalculatedPrice.toLocaleString('ru-RU');
            executeFiltering();
        }

        document.addEventListener("DOMContentLoaded", initApp);
    </script>
</body>
</html>
