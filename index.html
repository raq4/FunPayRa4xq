<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FunPayRa4xq — Витрина подарков</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #38bdf8;
            --price-color: #4ade80;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(56, 189, 248, 0.15);
        }

        .img-container {
            width: 100%;
            padding-top: 100%;
            position: relative;
            background: radial-gradient(circle, rgba(56,189,248,0.1) 0%, rgba(0,0,0,0) 70%);
        }

        .img-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 15px;
            box-sizing: border-box;
        }

        .info {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .number {
            font-size: 0.85rem;
            color: var(--accent-color);
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
            line-height: 1.3;
        }

        .price-container {
            margin-top: auto;
            margin-bottom: 15px;
        }

        .price {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--price-color);
        }

        .price::after {
            content: ' ₽';
            font-size: 1.2rem;
        }

        .ton-price {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .btn-buy {
            display: block;
            width: 100%;
            padding: 12px 0;
            background-color: var(--accent-color);
            color: var(--bg-color);
            text-align: center;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            transition: background-color 0.2s;
            box-sizing: border-box;
        }

        .btn-buy:hover {
            background-color: #7dd3fc;
        }

        .loading, .error {
            font-size: 1.2rem;
            color: var(--text-muted);
            grid-column: 1 / -1;
            text-align: center;
            padding: 5px;
        }
    </style>
</head>
<body>

    <header>
        <h1>FunPayRa4xq Marketplace</h1>
        <p>Уникальные подарки Telegram (до 8 TON) по лучшим ценам</p>
    </header>

    <main class="grid" id="catalog">
        <div class="loading">Загрузка витрины...</div>
    </main>

    <script>
        // ================= НАСТРОЙКИ МАГАЗИНА ================= //
        const FUNPAY_PROFILE = "https://funpay.com/users/ТВОЙ_АЙДИ/"; // <--- ВСТАВЬ ССЫЛКУ НА СВОЙ ПРОФИЛЬ!
        const TON_RATE = 650; // <--- УКАЖИ АКТУАЛЬНЫЙ КУРС TON К РУБЛЮ!
        const MARKUP = 1.35;  // Наценка 35% (1 = 0%, 1.35 = 35%)
        const MAX_PRICE_TON = 8; // <--- МАКСИМАЛЬНАЯ ЦЕНА В TON ДЛЯ ОТОБРАЖЕНИЯ НА САЙТЕ
        // ====================================================== //

        const catalog = document.getElementById('catalog');

        fetch('market_data.json')
            .then(response => {
                if (!response.ok) throw new Error('Ошибка сети при загрузке JSON');
                return response.json();
            })
            .then(data => {
                catalog.innerHTML = '';

                if (!data.results || data.results.length === 0) {
                    catalog.innerHTML = '<div class="loading">В данный момент нет доступных товаров.</div>';
                    return;
                }

                // Счетчик добавленных товаров
                let addedItemsCount = 0;

                data.results.forEach(item => {
                    const originalPriceTON = parseFloat(item.price);
                    
                    // ФИЛЬТР: Пропускаем предмет, если он дороже 8 TON
                    if (originalPriceTON > MAX_PRICE_TON) {
                        return; // Завершаем текущий шаг цикла и идем к следующему товару
                    }

                    // Если предмет прошел фильтр, увеличиваем счетчик
                    addedItemsCount++;

                    // Математика цены
                    const finalPriceRUB = Math.round(originalPriceTON * TON_RATE * MARKUP);

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="img-container">
                            <img src="${item.photo_url}" alt="${item.name}" loading="lazy">
                        </div>
                        <div class="info">
                            <div class="number">#${item.external_collection_number || 'NFT'}</div>
                            <div class="name">${item.name}</div>
                            <div class="price-container">
                                <div class="price">${finalPriceRUB}</div>
                                <div class="ton-price">Оригинал: ${originalPriceTON} TON</div>
                            </div>
                            <a href="${FUNPAY_PROFILE}" target="_blank" class="btn-buy">Купить на FunPay</a>
                        </div>
                    `;
                    catalog.appendChild(card);
                });

                // Если после фильтрации не осталось ни одного товара
                if (addedItemsCount === 0) {
                    catalog.innerHTML = '<div class="loading">Все найденные подарки дороже 8 TON.</div>';
                }
            })
            .catch(err => {
                console.error(err);
                catalog.innerHTML = '<div class="error">Не удалось загрузить витрину. Проверьте market_data.json</div>';
            });
    </script>

</body>
</html>
