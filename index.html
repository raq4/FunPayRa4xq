        :root {
            --bg-main: #0e0909;
            --bg-panel: #1a1010;
            --bg-input: #241616;
            --bg-card-bottom: #161618;
            --accent: #f28c8c;
            --accent-glow: rgba(242,140,140,0.18);
            --accent-dim: #a85555;
            --text-main: #f4eeee;
            --text-muted: #7a6b6b;
            --border: rgba(242,140,140,0.13);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Syne', sans-serif;
            background-color: var(--bg-main);
            background-image:
                radial-gradient(ellipse 80% 40% at 50% -10%, rgba(242,80,80,0.08) 0%, transparent 70%);
            color: var(--text-main);
            padding: 32px 20px 60px;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1440px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* ── Header ── */
        .header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }
        .header-logo {
            width: 38px; height: 38px;
            background: var(--accent);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            box-shadow: 0 0 18px var(--accent-glow);
        }
        .header-title {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            color: var(--text-main);
        }
        .header-title span { color: var(--accent); }
        .header-badge {
            margin-left: auto;
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 3px 9px;
            border-radius: 20px;
            opacity: 0.7;
        }
        .source-badge {
            font-family: 'Space Mono', monospace;
            font-size: 0.68rem;
            color: var(--text-muted);
            border: 1px solid var(--border);
            padding: 3px 9px;
            border-radius: 20px;
        }
        .source-badge.live { color: #4ade80; border-color: rgba(74,222,128,0.3); }

        /* ── Filter panel ── */
        .filter-panel {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .search-bar {
            display: flex;
            gap: 10px;
        }
        .search-bar input {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 11px 16px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-family: 'Syne', sans-serif;
            outline: none;
            transition: border-color .2s;
        }
        .search-bar input:focus { border-color: var(--accent); }
        .search-bar input::placeholder { color: var(--text-muted); }

        .btn-clear {
            background: #7f1d1d;
            color: #ffcece;
            border: none;
            padding: 0 18px;
            border-radius: 10px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background .2s;
        }
        .btn-clear:hover { background: #991b1b; }

        .btn-reload {
            background: #1a3320;
            color: #4ade80;
            border: 1px solid rgba(74,222,128,0.25);
            padding: 0 14px;
            border-radius: 10px;
            font-family: 'Space Mono', monospace;
            font-size: 0.72rem;
            cursor: pointer;
            transition: background .2s;
            white-space: nowrap;
        }
        .btn-reload:hover { background: #14422a; }

        .filters-row {
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            align-items: center;
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .filter-group label {
            font-size: 0.78rem;
            color: var(--text-muted);
            font-family: 'Space Mono', monospace;
        }
        .filter-group select {
            background: var(--bg-input);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 7px 10px;
            border-radius: 8px;
            font-family: 'Syne', sans-serif;
            font-size: 0.83rem;
            outline: none;
            cursor: pointer;
        }
        .slider-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-grow: 1;
            max-width: 360px;
        }
        .slider-wrapper input[type="range"] {
            flex: 1;
            accent-color: var(--accent);
            cursor: pointer;
        }
        .price-val {
            font-family: 'Space Mono', monospace;
            font-size: 0.85rem;
            color: var(--accent);
            font-weight: 700;
            min-width: 72px;
        }

        /* ── Status bar ── */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .status-text {
            font-family: 'Space Mono', monospace;
            font-size: 0.78rem;
            color: var(--text-muted);
        }
        #loading-spinner {
            width: 14px; height: 14px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .7s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Grid ── */
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
            gap: 18px;
        }

        /* ── Card ── */
        .card {
            border: 1.5px solid var(--accent);
            border-radius: 18px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            text-decoration: none;
            color: inherit;
            transition: transform .18s, box-shadow .18s;
            background: var(--bg-card-bottom);
            aspect-ratio: 1 / 1.3;
        }
        .card:hover {
            transform: translateY(-4px) scale(1.015);
            box-shadow: 0 8px 32px rgba(242,100,100,0.18);
        }

        .gift-number {
            position: absolute;
            top: 9px; right: 9px;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(6px);
            color: #fff;
            font-family: 'Space Mono', monospace;
            font-size: 0.68rem;
            padding: 3px 8px;
            border-radius: 20px;
            z-index: 3;
            letter-spacing: 0.03em;
        }

        .img-container {
            width: 100%;
            height: 62%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        .img-container::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.35) 100%);
            pointer-events: none;
            z-index: 2;
        }
        .img-container img {
            max-width: 72%;
            max-height: 72%;
            object-fit: contain;
            z-index: 1;
            transition: transform .3s ease;
            image-rendering: -webkit-optimize-contrast;
        }
        .card:hover .img-container img { transform: scale(1.06); }

        /* skeleton for images loading */
        .img-container img.loading {
            opacity: 0;
        }
        .img-container img.loaded {
            animation: fadeIn .3s ease forwards;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card-content {
            height: 38%;
            padding: 11px 14px 13px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .item-title {
            font-size: 0.98rem;
            font-weight: 800;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: -0.02em;
        }
        .item-details {
            font-family: 'Space Mono', monospace;
            font-size: 0.66rem;
            color: #6b5f5f;
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            gap: 1px;
        }
        .price-row {
            font-family: 'Space Mono', monospace;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent);
        }

        .state-container {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            font-family: 'Space Mono', monospace;
            font-size: 0.85rem;
        }

        /* ── Portals live tag on card ── */
        .live-tag {
            position: absolute;
            top: 9px; left: 9px;
            background: rgba(74,222,128,0.15);
            border: 1px solid rgba(74,222,128,0.35);
            color: #4ade80;
            font-family: 'Space Mono', monospace;
            font-size: 0.6rem;
            padding: 2px 7px;
            border-radius: 20px;
            z-index: 3;
        }
    </style>
</head>

    { id: "sakura-flower",   name: "Sakura Flower",    number: "14258",  model: "Bloom",        bgName: "Japan",        bgColor: "#4d1234", tonPrice: 7.36 },
    { id: "flying-broom",    name: "Flying Broom",     number: "75369",  model: "Nimbus",       bgName: "Witchcraft",   bgColor: "#2d1a4a", tonPrice: 7.59 },
    { id: "crystal-ball",    name: "Crystal Ball",     number: "85247",  model: "Oracle",       bgName: "Future",       bgColor: "#1e1b4b", tonPrice: 7.61 },
    { id: "top-hat",         name: "Top Hat",          number: "34302",  model: "Gentleman",    bgName: "Charcoal",     bgColor: "#1f2937", tonPrice: 7.88 },
    { id: "record-player",   name: "Record Player",    number: "96341",  model: "Vinyl",        bgName: "Retro",        bgColor: "#3f2c12", tonPrice: 7.94 }
];

/* ─────────────────────────────────────────
   STATE
───────────────────────────────────────── */
let APP_STATE = {
    items: LOCAL_DATA,
    isLive: false,
};

/* ─────────────────────────────────────────
   DOM REFS
───────────────────────────────────────── */
const domCatalog   = document.getElementById('catalog-view');
const domCounter   = document.getElementById('counter-text');
const domSearch    = document.getElementById('search-input');
const domRange     = document.getElementById('price-range');
const domPriceVal  = document.getElementById('price-limit-val');
const domSort      = document.getElementById('sort-select');
const domReset     = document.getElementById('btn-reset-all');
const domReload    = document.getElementById('btn-reload');
const domSpinner   = document.getElementById('loading-spinner');
const domSource    = document.getElementById('source-label');

/* ─────────────────────────────────────────
   PRICE HELPERS
───────────────────────────────────────── */
function calcRubPrice(tonPrice) {
    const raw = Math.ceil(tonPrice * CONFIG.TON_RATE * CONFIG.MARKUP_FACTOR);
    return raw < CONFIG.MIN_PRICE ? CONFIG.MIN_PRICE : raw;
}

/* Convert gift slug from Portals format to image slug (e.g. "instant-ramen" → "instantramen") */
function slugToFragmentSlug(id) {
    return id.replace(/-/g, '').toLowerCase();
}

/* ─────────────────────────────────────────
   IMAGE URL BUILDER
   Fragment CDN: nft.fragment.com/gift/{slug}-{number}.large.jpg
───────────────────────────────────────── */
function getImgUrl(item) {
    // If it comes from the Portals API and has photo_url, use that directly
    if (item.photo_url) return item.photo_url;

    const slug = slugToFragmentSlug(item.id);
    const num  = item.number || item.external_collection_number || '';

    if (num) {
        return `https://nft.fragment.com/gift/${slug}-${num}.large.jpg`;
    }
    // Fallback: collection-level thumbnail from fragment
    return `https://nft.fragment.com/gift/${slug}.large.jpg`;
}

/* ─────────────────────────────────────────
   COLOR HELPER
───────────────────────────────────────── */
function hashColor(str) {
    let h = 0;
    for (let i = 0; i < str.length; i++) h = str.charCodeAt(i) + ((h << 5) - h);
    let c = '#';
    for (let i = 0; i < 3; i++) {
        const v = Math.floor(((h >> (i * 8)) & 0xFF) * 0.35) + 15;
        c += ('00' + v.toString(16)).slice(-2);
    }
    return c;
}

/* ─────────────────────────────────────────
   PORTALS MARKET API FETCH
   Tries 3 strategies in sequence:
   1. Direct fetch to portals.tg (works if CORS open)
   2. Via corsproxy.io
   3. Falls back to LOCAL_DATA
───────────────────────────────────────── */
async function fetchPortalsData() {
    setLoading(true);
    domSource.textContent = '⏳ загрузка Portals…';
    domSource.className = 'source-badge';

    const endpoints = [
        // Strategy 1: direct (works in some environments)
        { url: `${CONFIG.PORTALS_SEARCH}?sort=price_asc&limit=100&offset=0`, method: 'GET' },
        // Strategy 2: via CORS proxy
        { url: `${CONFIG.CORS_PROXY}${encodeURIComponent(CONFIG.PORTALS_SEARCH + '?sort=price_asc&limit=100&offset=0')}`, method: 'GET' },
        // Strategy 3: alternate Portals endpoint
        { url: `${CONFIG.CORS_PROXY}${encodeURIComponent('https://portals.tg/api/nfts?sort=price_asc&limit=100')}`, method: 'GET' },
    ];

    for (const ep of endpoints) {
        try {
            const res = await fetch(ep.url, {
                method: ep.method,
                headers: { 'Content-Type': 'application/json' },
                signal: AbortSignal.timeout(6000),
            });
            if (!res.ok) continue;

            const data = await res.json();
            // Portals returns array or { items: [] } or { gifts: [] }
            const raw = Array.isArray(data) ? data
                      : (data.items || data.gifts || data.results || []);

            if (raw.length > 0) {
                APP_STATE.items  = normalizePortalsItems(raw);
                APP_STATE.isLive = true;
                domSource.textContent = `✅ Portals live · ${raw.length} listings`;
                domSource.className = 'source-badge live';
                setLoading(false);
                return;
            }
        } catch (_) { /* try next */ }
    }

    // All strategies failed → local fallback
    useLocalFallback();
}

/* Normalize Portals API items to our internal format */
function normalizePortalsItems(raw) {
    return raw.map(item => {
        const priceInTon = parseFloat(item.price || item.ton_price || 0);
        const attrs = item.attributes || [];
        const model = attrs.find(a => a.type === 'model')?.value || 'Standard';
        const backdrop = attrs.find(a => a.type === 'backdrop')?.value || 'Default';
        // Build an id from the name
        const id = (item.name || 'gift').toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
        return {
            id,
            name:      item.name || 'Unknown',
            number:    String(item.external_collection_number || item.tg_id || ''),
            model,
            bgName:    backdrop,
            bgColor:   item.backdrop_color || hashColor(id),
            tonPrice:  priceInTon,
            photo_url: item.photo_url || null,
            isLive:    true,
            portalUrl: item.id ? `https://portals.tg/nft/${item.id}` : null,
        };
    });
}

function useLocalFallback() {
    APP_STATE.items  = LOCAL_DATA;
    APP_STATE.isLive = false;
    domSource.textContent = '📦 локальные данные';
    domSource.className = 'source-badge';
    setLoading(false);
}

function setLoading(v) {
    domSpinner.style.display = v ? 'block' : 'none';
}

/* ─────────────────────────────────────────
   FILTER + RENDER
───────────────────────────────────────── */
function initSlider() {
    const prices = APP_STATE.items.map(i => calcRubPrice(i.tonPrice));
    const maxP = Math.max(...prices, 600);
    domRange.max   = maxP;
    domRange.value = maxP;
    domPriceVal.textContent = maxP.toLocaleString('ru-RU');
}

function applyFilters() {
    const q      = domSearch.value.toLowerCase().trim();
    const maxP   = parseInt(domRange.value);
    const order  = domSort.value;

    let filtered = APP_STATE.items.filter(item => {
        const price = calcRubPrice(item.tonPrice);
        const nameMatch = !q || item.name.toLowerCase().includes(q);
        return nameMatch && price <= maxP;
    });

    filtered.sort((a, b) => {
        const diff = calcRubPrice(a.tonPrice) - calcRubPrice(b.tonPrice);
        return order === 'asc' ? diff : -diff;
    });

    render(filtered);
}

function render(dataset) {
    domCatalog.innerHTML = '';
    domCounter.textContent = `Всего: ${dataset.length} подарков`;

    if (dataset.length === 0) {
        domCatalog.innerHTML = `<div class="state-container">Ничего не найдено</div>`;
        return;
    }

    dataset.forEach(item => {
        const price   = calcRubPrice(item.tonPrice);
        const imgUrl  = getImgUrl(item);
        const bg      = item.bgColor || hashColor(item.id);
        const href    = item.isLive && item.portalUrl ? item.portalUrl : CONFIG.FUNPAY_PROFILE;

        const card = document.createElement('a');
        card.href   = href;
        card.target = '_blank';
        card.rel    = 'noopener noreferrer';
        card.className = 'card';

        card.innerHTML = `
            ${item.isLive ? '<div class="live-tag">LIVE</div>' : ''}
            <div class="gift-number">#${item.number || '—'}</div>
            <div class="img-container" style="background-color:${bg}">
                <img
                    class="loading"
                    src="${imgUrl}"
                    alt="${item.name}"
                    loading="lazy"
                    onerror="this.onerror=null;this.src='https://nft.fragment.com/gift/${slugToFragmentSlug(item.id)}.large.jpg';this.onerror=function(){this.style.opacity='0.3';this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 1 1%22><rect fill=%22%23333%22 width=%221%22 height=%221%22/></svg>'}"
                    onload="this.classList.remove('loading');this.classList.add('loaded')"
                >
            </div>
            <div class="card-content">
                <div>
                    <div class="item-title">${item.name}</div>
                    <div class="item-details">
                        <div>модель: ${item.model}</div>
                        <div>фон: ${item.bgName}</div>
                    </div>
                </div>
                <div class="price-row">${price.toLocaleString('ru-RU')} ₽</div>
            </div>
        `;
        domCatalog.appendChild(card);
    });
}

/* ─────────────────────────────────────────
   INIT
───────────────────────────────────────── */
async function initApp() {
    // Try to load live data from Portals first
    await fetchPortalsData();

    // Set up slider based on loaded data
    initSlider();
    applyFilters();

    // Wire up events
    domSearch.addEventListener('input', applyFilters);
    domRange.addEventListener('input', () => {
        domPriceVal.textContent = parseInt(domRange.value).toLocaleString('ru-RU');
    });
    domRange.addEventListener('change', applyFilters);
    domSort.addEventListener('change', applyFilters);

    domReset.addEventListener('click', () => {
        domSearch.value = '';
        domRange.value  = domRange.max;
        domPriceVal.textContent = parseInt(domRange.max).toLocaleString('ru-RU');
        domSort.value = 'asc';
        applyFilters();
    });

    domReload.addEventListener('click', async () => {
        await fetchPortalsData();
        initSlider();
        applyFilters();
    });
}

document.addEventListener('DOMContentLoaded', initApp);
</script>
