<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Gifts Showcase</title>
    <style>
        :root {
            --bg-main: #140d0d;
            --bg-panel: #1f1414;
            --bg-input: #2d1e1e;
            --accent: #f29393;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 30px 20px;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .filter-panel {
            background-color: var(--bg-panel);
            border: 1px solid rgba(242, 147, 147, 0.2);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .search-bar {
            display: flex;
            gap: 12px;
        }

        .search-bar input {
            flex: 1;
            background-color: var(--bg-input);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.95rem;
            outline: none;
        }

        .search-bar input:focus {
            border-color: var(--accent);
        }

        .btn-clear {
            background-color: #dc2626;
            color: #ffffff;
            border: none;
            padding: 0 20px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        .filters-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filter-group label {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .filter-group select {
            background-color: var(--bg-input);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 12px;
            border-radius: 6px;
            outline: none;
            cursor: pointer;
        }

        .slider-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-grow: 1;
            max-width: 400px;
        }

        .slider-wrapper input[type="range"] {
            flex: 1;
            accent-color: var(--accent);
        }

        .status-text {
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
        }

        /* КАРТОЧКА 1 В 1 */
        .card {
            border: 4px solid var(--accent);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            aspect-ratio: 1 / 1.25;
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: scale(1.02);
        }

        .gift-number {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            color: #ffffff;
            font-size: 0.75rem;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 20px;
            z-index: 2;
        }

        .img-container {
            width: 100%;
            height: 65%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .img-container img {
            max-width: 70%;
            max-height: 70%;
            object-fit: contain;
            z-index: 1;
        }

        .card-content {
            height: 35%;
            background-color: #18181c;
            padding: 12px 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .item-title {
            font-size: 1.05rem;
            font-weight: bold;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-details {
            font-size: 0.75rem;
            color: #a1a1aa;
            line-height: 1.4;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .price-row {
            font-size: 1.25rem;
            font-weight: bold;
            color: var(--accent);
            margin-top: auto;
        }

        .state-container {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

        <main class="catalog-grid" id="catalog-view"></main>

        let APP_STATE = { items: LOCAL_DATA };

        const domCatalog = document.getElementById('catalog-view');

        const domSearch = document.getElementById('search-input');
        const domPriceRange = document.getElementById('price-range');
        const domPriceLimitVal = document.getElementById('price-limit-val');
        const domSort = document.getElementById('sort-select');
        const domReset = document.getElementById('btn-reset-all');

        function calculateFinalRubPrice(tonPrice) {
            const calculated = Math.ceil((tonPrice * CONFIG.TON_RATE) * CONFIG.MARKUP_FACTOR);
            return calculated < CONFIG.MIN_PRICE ? CONFIG.MIN_PRICE : calculated;
        }

        // Хэш-функция для генерации фонового цвета, если он не задан в базе
        function getFallbackBgColor(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = str.charCodeAt(i) + ((hash << 5) - hash);
            }
            let color = '#';
            for (let i = 0; i < 3; i++) {
                let value = (hash >> (i * 8)) & 0xFF;
                // Сдвигаем в темные тона, чтобы подходило под стиль
                value = Math.floor(value * 0.4); 
                color += ('00' + value.toString(16)).substr(-2);
            }
            return color;
        }

        function initApp() {
            const prices = APP_STATE.items.map(item => calculateFinalRubPrice(item.tonPrice));
            const maxPrice = Math.max(...prices);
            domPriceRange.max = maxPrice;
            domPriceRange.value = maxPrice;
            domPriceLimitVal.textContent = maxPrice.toLocaleString('ru-RU');

            executeFiltering();

            domSearch.addEventListener('input', executeFiltering);
            domPriceRange.addEventListener('input', () => domPriceLimitVal.textContent = parseInt(domPriceRange.value).toLocaleString('ru-RU'));
            domPriceRange.addEventListener('change', executeFiltering);
            domSort.addEventListener('change', executeFiltering);
            domReset.addEventListener('click', () => {
                domSearch.value = '';
                domPriceRange.value = domPriceRange.max;
                domPriceLimitVal.textContent = parseInt(domPriceRange.max).toLocaleString('ru-RU');
                domSort.value = 'asc';
                executeFiltering();
            });
        }

        function executeFiltering() {
            const query = domSearch.value.toLowerCase().trim();
            const chosenMaxPrice = parseInt(domPriceRange.value);
            const sortOrder = domSort.value;

            let filtered = APP_STATE.items.filter(item => {
                const price = calculateFinalRubPrice(item.tonPrice);
                return (!query || item.name.toLowerCase().includes(query)) && price <= chosenMaxPrice;
            });

            filtered.sort((a, b) => {
                const pA = calculateFinalRubPrice(a.tonPrice);
                const pB = calculateFinalRubPrice(b.tonPrice);
                return sortOrder === 'asc' ? pA - pB : pB - pA;
            });

            renderShowcaseView(filtered);
        }

        function renderShowcaseView(dataset) {
            domCatalog.innerHTML = '';
            domCounter.textContent = `Всего предметов: ${dataset.length}`;

            if (dataset.length === 0) {
                domCatalog.innerHTML = `<div class="state-container">Подарков не найдено</div>`;
                return;
            }

            dataset.forEach(item => {
                const finalPrice = calculateFinalRubPrice(item.tonPrice);
                
                // Исправленный стабильный URL официальных картинок Telegram Gifts
                const imgUrl = `https://github.com/telegramdesktop/tdesktop/raw/master/Telegram/Resources/tgclicks/gifts/${item.id}.png`;
                const cardBg = item.bgColor || getFallbackBgColor(item.id);

                const cardNode = document.createElement('a');
                cardNode.href = CONFIG.FUNPAY_PROFILE;
                cardNode.target = "_blank";
                cardNode.className = 'card';
                
                cardNode.innerHTML = `
                    <div class="gift-number">#${item.number || '00000'}</div>
                    <div class="img-container" style="background-color: ${cardBg}">
                        <img src="${imgUrl}" alt="${item.name}" onerror="this.onerror=null; this.src='https://raw.githubusercontent.com/portals-to/assets/main/items/${item.id}/image.png';">
                    </div>
                    <div class="card-content">
                        <div>
                            <div class="item-title">${item.name}</div>
                            <div class="item-details">
                                <div>Модель: ${item.model || 'Standard'}</div>
                                <div>Фон: ${item.bgName || 'Default'}</div>
                            </div>
                        </div>
                        <div class="price-row">${finalPrice.toLocaleString('ru-RU')} ₽</div>
                    </div>
                `;
                domCatalog.appendChild(cardNode);
            });
        }

        document.addEventListener("DOMContentLoaded", initApp);
    </script>

</html>
