<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portals Marketplace — FunPay Showcase</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --accent: #38bdf8;
            --accent-hover: #7dd3fc;
            --success: #4ade80;
            --error: #f87171;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--accent), #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .rate-badge {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .rate-badge span {
            color: var(--success);
        }

        /* ПАНЕЛЬ УПРАВЛЕНИЯ ФИЛЬТРАМИ */
        .filter-panel {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .search-bar {
            display: flex;
            gap: 12px;
        }

        .search-bar input {
            flex: 1;
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-bar input:focus {
            border-color: var(--accent);
        }

        .btn-clear {
            background-color: #dc2626;
            color: #ffffff;
            border: none;
            padding: 0 24px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-clear:hover {
            background-color: #b91c1c;
        }

        .filters-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            align-items: end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-group label {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .filter-group select {
            background-color: var(--bg-input);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            cursor: pointer;
        }

        .slider-wrapper {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .slider-outputs {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .slider-outputs span span {
            color: var(--accent);
            font-weight: 700;
        }

        .filter-group input[type="range"] {
            width: 100%;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .status-text {
            font-size: 1rem;
            color: var(--text-muted);
        }

        /* АДАПТИВНАЯ СЕТКА КАТАЛОГА */
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px;
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(56, 189, 248, 0.12);
        }

        .img-container {
            width: 100%;
            padding-top: 100%;
            position: relative;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.05) 0%, rgba(0,0,0,0) 70%);
        }

        .img-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 16px;
        }

        .card-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .type-badge {
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--accent);
            background-color: rgba(56, 189, 248, 0.1);
            padding: 4px 8px;
            border-radius: 6px;
            align-self: flex-start;
            margin-bottom: 12px;
        }

        .item-title {
            font-size: 1.15rem;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 16px;
            min-height: 2.8rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .price-row {
            margin-top: auto;
            margin-bottom: 16px;
        }

        .price-rub {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--success);
        }

        .price-ton {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .btn-buy {
            display: block;
            width: 100%;
            background-color: var(--accent);
            color: #0f172a;
            text-align: center;
            padding: 14px 0;
            border-radius: 10px;
            font-weight: 700;
            text-decoration: none;
            font-size: 1rem;
            transition: background-color 0.2s;
        }

        .btn-buy:hover {
            background-color: var(--accent-hover);
        }

        /* ИНДИКАТОРЫ СОСТОЯНИЙ */
        .state-container {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
            font-size: 1.2rem;
            font-weight: 600;
        }

        .state-error {
            color: var(--error);
            background-color: rgba(248, 113, 113, 0.05);
            border: 1px dashed var(--error);
            border-radius: 12px;
            padding: 30px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Portals Showcase</h1>
            <div class="rate-badge">Курс TON: <span id="ton-rate-val">Загрузка...</span></div>
        </header>

        <section class="filter-panel">
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Введите название предмета для мгновенного поиска...">
                <button class="btn-clear" id="btn-reset-all">Сбросить всё</button>
            </div>

            <div class="filters-row">
                <div class="filter-group">
                    <label for="type-select">Тип предмета</label>
                    <select id="type-select">
                        <option value="all">All (Все типы)</option>
                        <option value="model">MODEL</option>
                        <option value="back">BACK</option>
                        <option value="symbol">SYMBOL</option>
                        <option value="gift">GIFT</option>
                    </select>
                </div>

                <div class="filter-group slider-wrapper">
                    <div class="slider-outputs">
                        <label>Фильтр по цене</label>
                        <span>до: <span id="price-limit-val">0</span> ₽</span>
                    </div>
                    <input type="range" id="price-range" min="0" max="10000" step="1">
                </div>
            </div>
        </section>

        <div class="status-text" id="counter-text">Инициализация потоков данных...</div>

        <main class="catalog-grid" id="catalog-view">
            <div class="state-container">Выполняется защищенный запрос к API Portals...</div>
        </main>
    </div>

    <script>
        /**
         * АРХИТЕКТУРНАЯ КОНФИГУРАЦИЯ СИСТЕМЫ
         */
        const CONFIG = {
            FUNPAY_PROFILE: "https://funpay.com/users/13409860/",
            MARKUP_FACTOR: 1.35,
            // Если браузер блокирует запросы из-за CORS policies, измените значение на true
            USE_CORS_PROXY: false, 
            PROXY_URL: "https://cors-anywhere.herokuapp.com/",
            API_PORTALS: "https://api.portals.to/v1/collections?include=items",
            API_COINGECKO: "https://api.coingecko.com/api/v3/simple/price?ids=the-open-network&vs_currencies=rub"
        };

        // Глобальный State менеджер приложения
        let APP_STATE = {
            tonToRubRate: 0,
            rawItems: [],
            minCalculatedPrice: 0,
            maxCalculatedPrice: 0
        };

        // DOM Кэш-элементы
        const domCatalog = document.getElementById('catalog-view');
        const domRate = document.getElementById('ton-rate-val');
        const domCounter = document.getElementById('counter-text');
        const domSearch = document.getElementById('search-input');
        const domType = document.getElementById('type-select');
        const domPriceRange = document.getElementById('price-range');
        const domPriceLimitVal = document.getElementById('price-limit-val');
        const domReset = document.getElementById('btn-reset-all');

        /**
         * ИНИЦИАЛИЗАЦИЯ И ПОЛУЧЕНИЕ ДАННЫХ
         */
        async function runPipeline() {
            try {
                // 1. Получение актуального курса валют
                const coingeckoUrl = CONFIG.USE_CORS_PROXY ? CONFIG.PROXY_URL + CONFIG.API_COINGECKO : CONFIG.API_COINGECKO;
                const rateResponse = await fetch(coingeckoUrl);
                if (!rateResponse.ok) throw new Error("Не удалось получить котировки валют от CoinGecko API.");
                const rateData = await rateResponse.json();
                APP_STATE.tonToRubRate = parseFloat(rateData["the-open-network"].rub);
                domRate.textContent = `${APP_STATE.tonToRubRate.toLocaleString('ru-RU')} ₽`;

                // 2. Получение массива токенов
                const portalsUrl = CONFIG.USE_CORS_PROXY ? CONFIG.PROXY_URL + CONFIG.API_PORTALS : CONFIG.API_PORTALS;
                const portalsResponse = await fetch(portalsUrl);
                if (!portalsResponse.ok) throw new Error("Удаленный сервер Portals API отклонил запрос или недоступен.");
                const portalsData = await portalsResponse.json();

                // 3. Высокоточный реляционный парсинг структуры JSON
                normalizePortalsData(portalsData);

                if (APP_STATE.rawItems.length === 0) {
                    displaySystemError("API вернул пустой массив данных или структура изменилась.");
                    return;
                }

                // 4. Расчет крайних точек диапазона цен для калибровки ползунка
                calibratePriceSlider();

                // 5. Первичный запуск рендеринга
                executeFiltering();

                // Навешивание обработчиков событий (интерактив)
                domSearch.addEventListener('input', executeFiltering);
                domType.addEventListener('change', executeFiltering);
                domPriceRange.addEventListener('input', handleSliderMovement);
                domPriceRange.addEventListener('change', executeFiltering);
                domReset.addEventListener('click', clearFormFilters);

            } catch (error) {
                console.error("Critical System Error:", error);
                displaySystemError(error.message);
            }
        }

        /**
         * УМНЫЙ МАППИНГ И НОРМАЛИЗАЦИЯ ДАННЫХ ИЗ API
         */
        function normalizePortalsData(payload) {
            let extractedCollections = [];
            
            // Проверка различных вариантов структуры ответа API
            if (Array.isArray(payload)) {
                extractedCollections = payload;
            } else if (payload.data && Array.isArray(payload.data)) {
                extractedCollections = payload.data;
            } else if (payload.collections && Array.isArray(payload.collections)) {
                extractedCollections = payload.collections;
            } else {
                extractedCollections = [payload];
            }

            let temporaryContainer = [];

            extractedCollections.forEach(collection => {
                const searchPool = collection.items || collection.cards || collection.nfts || [];
                if (Array.isArray(searchPool)) {
                    searchPool.forEach(item => {
                        // Поиск валидной цены внутри структуры объекта
                        let extractedPrice = 0;
                        if (item.price) extractedPrice = item.price;
                        else if (item.floorPrice) extractedPrice = item.floorPrice;
                        else if (item.listing && item.listing.price) extractedPrice = item.listing.price;

                        // Поиск ссылки на медиа-ресурс
                        let extractedImage = item.image || item.imageUrl || item.image_url || item.photo_url || "";

                        // Вычисление типа предмета на основе внутренних свойств или названия
                        let calculatedType = "gift";
                        if (item.type) {
                            calculatedType = item.type.toLowerCase();
                        } else if (item.name) {
                            const lowerName = item.name.toLowerCase();
                            if (lowerName.includes("back")) calculatedType = "back";
                            else if (lowerName.includes("symbol")) calculatedType = "symbol";
                            else if (lowerName.includes("model")) calculatedType = "model";
                        }

                        if (item.name && extractedPrice) {
                            temporaryContainer.push({
                                id: item.id || Math.random().toString(36).substr(2, 9),
                                name: item.name,
                                tonPrice: parseFloat(extractedPrice),
                                image: extractedImage,
                                type: calculatedType
                            });
                        }
                    });
                }
            });

            APP_STATE.rawItems = temporaryContainer;
        }

        /**
         * АВТОМАТИЧЕСКАЯ КАЛИБРОВКА ПОЛЗУНКА ЦЕН
         */
        function calibratePriceSlider() {
            const calculatedPrices = APP_STATE.rawItems.map(item => 
                Math.ceil((item.tonPrice * APP_STATE.tonToRubRate) * CONFIG.MARKUP_FACTOR)
            );

            APP_STATE.minCalculatedPrice = Math.min(...calculatedPrices);
            APP_STATE.maxCalculatedPrice = Math.max(...calculatedPrices);

            domPriceRange.min = APP_STATE.minCalculatedPrice;
            domPriceRange.max = APP_STATE.maxCalculatedPrice;
            domPriceRange.value = APP_STATE.maxCalculatedPrice;
            domPriceLimitVal.textContent = APP_STATE.maxCalculatedPrice.toLocaleString('ru-RU');
        }

        function handleSliderMovement() {
            domPriceLimitVal.textContent = parseInt(domPriceRange.value).toLocaleString('ru-RU');
        }

        /**
         * КЛЮЧЕВАЯ ЛОГИКА ФИЛЬТРАЦИИ И ВЫВОДА В DOM
         */
        function executeFiltering() {
            const query = domSearch.value.toLowerCase().trim();
            const selectedType = domType.value;
            const chosenMaxPrice = parseInt(domPriceRange.value);

            const filteredDataSet = APP_STATE.rawItems.filter(item => {
                const finalRubPrice = Math.ceil((item.tonPrice * APP_STATE.tonToRubRate) * CONFIG.MARKUP_FACTOR);
                
                const matchQuery = !query || item.name.toLowerCase().includes(query);
                const matchType = selectedType === 'all' || item.type === selectedType;
                const matchPrice = finalRubPrice <= chosenMaxPrice;

                return matchQuery && matchType && matchPrice;
            });

            renderShowcaseView(filteredDataSet);
        }

        /**
         * СБОРКА И ОТРИСОВКА КАРТОЧЕК В ИНТЕРФЕЙСЕ
         */
        function renderShowcaseView(dataset) {
            domCatalog.innerHTML = '';
            domCounter.textContent = `Найдено предметов в каталоге: ${dataset.length}`;

            if (dataset.length === 0) {
                domCatalog.innerHTML = `
                    <div class="state-container">
                        Нет предметов, соответствующих заданным критериям фильтрации.
                    </div>`;
                return;
            }

            dataset.forEach(item => {
                const finalRubPrice = Math.ceil((item.tonPrice * APP_STATE.tonToRubRate) * CONFIG.MARKUP_FACTOR);

                const cardNode = document.createElement('div');
                cardNode.className = 'card';
                cardNode.innerHTML = `
                    <div class="img-container">
                        <img src="${item.image || 'https://placehold.co/400x400/1e293b/f8fafc?text=NFT'}" alt="${item.name}" loading="lazy">
                    </div>
                    <div class="card-content">
                        <div class="type-badge">${item.type}</div>
                        <div class="item-title">${item.name}</div>
                        <div class="price-row">
                            <div class="price-rub">${finalRubPrice.toLocaleString('ru-RU')} ₽</div>
                            <div class="price-ton">Оригинал: ${item.tonPrice} TON</div>
                        </div>
                        <a href="${CONFIG.FUNPAY_PROFILE}" target="_blank" class="btn-buy">Купить на FunPay</a>
                    </div>
                `;
                domCatalog.appendChild(cardNode);
            });
        }

        /**
         * СБРОС И ОЧИСТКА СОСТОЯНИЙ
         */
        function clearFormFilters() {
            domSearch.value = '';
            domType.value = 'all';
            domPriceRange.value = APP_STATE.maxCalculatedPrice;
            domPriceLimitVal.textContent = APP_STATE.maxCalculatedPrice.toLocaleString('ru-RU');
            executeFiltering();
        }

        /**
         * ОТБРАКОВКА И ОБРАБОТКА ОШИБОК
         */
        function displaySystemError(message) {
            domCatalog.innerHTML = `
                <div class="state-container grid-column: 1/-1;">
                    <div class="state-error">
                        <p style="margin-bottom: 10px;">🛑 КРИТИЧЕСКИЙ СБОЙ ПРИ ИНТЕГРАЦИИ API:</p>
                        <p style="font-size: 0.95rem; color: var(--text-main); font-family: monospace;">${message}</p>
                        <p style="font-size: 0.85rem; margin-top: 15px; color: var(--text-muted);">
                            Если проблема вызвана блокировкой CORS, откройте код index.html и переключите <span style="color:var(--accent)">USE_CORS_PROXY: true</span> в объекте конфигурации CONFIG.
                        </p>
                    </div>
                </div>`;
            domCounter.textContent = "Ошибка загрузки данных.";
            domRate.textContent = "Н/Д";
        }

        // Запуск конвейера при полной загрузке документа
        document.addEventListener("DOMContentLoaded", runPipeline);
    </script>
</body>
</html>
