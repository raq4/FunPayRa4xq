<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portals Showcase — Gifts Market</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --accent: #38bdf8;
            --accent-hover: #7dd3fc;
            --success: #4ade80;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--accent), #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .filter-panel {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .search-bar {
            display: flex;
            gap: 12px;
        }

        .search-bar input {
            flex: 1;
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-bar input:focus {
            border-color: var(--accent);
        }

        .btn-clear {
            background-color: #dc2626;
            color: #ffffff;
            border: none;
            padding: 0 24px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-clear:hover {
            background-color: #b91c1c;
        }

        .filters-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            align-items: end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-group label {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .filter-group select {
            background-color: var(--bg-input);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            cursor: pointer;
        }

        .slider-wrapper {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .slider-outputs {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .slider-outputs span span {
            color: var(--accent);
            font-weight: 700;
        }

        .filter-group input[type="range"] {
            width: 100%;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .status-text {
            font-size: 1rem;
            color: var(--text-muted);
        }

        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px;
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(56, 189, 248, 0.12);
        }

        .img-container {
            width: 100%;
            padding-top: 100%;
            position: relative;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.05) 0%, rgba(0,0,0,0) 70%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .img-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 16px;
        }

        .card-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .type-badge {
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--accent);
            background-color: rgba(56, 189, 248, 0.1);
            padding: 4px 8px;
            border-radius: 6px;
            align-self: flex-start;
            margin-bottom: 12px;
        }

        .item-title {
            font-size: 1.15rem;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 16px;
            min-height: 2.8rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .price-row {
            margin-top: auto;
            margin-bottom: 16px;
        }

        .price-rub {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--success);
        }

        .btn-buy {
            display: block;
            width: 100%;
            background-color: var(--accent);
            color: #0f172a;
            text-align: center;
            padding: 14px 0;
            border-radius: 10px;
            font-weight: 700;
            text-decoration: none;
            font-size: 1rem;
            transition: background-color 0.2s;
        }

        .btn-buy:hover {
            background-color: var(--accent-hover);
        }

        .state-container {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
            font-size: 1.2rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Portals Showcase</h1>
        </header>

        <section class="filter-panel">
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Введите название подарка для мгновенного поиска...">
                <button class="btn-clear" id="btn-reset-all">Сбросить всё</button>
            </div>

            <div class="filters-row">
                <div class="filter-group slider-wrapper">
                    <div class="slider-outputs">
                        <label>Фильтр по цене</label>
                        <span>до: <span id="price-limit-val">0</span> ₽</span>
                    </div>
                    <input type="range" id="price-range" min="0" max="20000" step="5">
                </div>

                <div class="filter-group">
                    <label for="sort-select">Сортировка цены</label>
                    <select id="sort-select">
                        <option value="asc">Сначала дешевле</option>
                        <option value="desc">Сначала дороже</option>
                    </select>
                </div>
            </div>
        </section>

        <div class="status-text" id="counter-text">Инициализация витрины...</div>

        <main class="catalog-grid" id="catalog-view">
            <div class="state-container">Загрузка подарков...</div>
        </main>
    </div>

    <script>
        const CONFIG = {
            FUNPAY_PROFILE: "https://funpay.com/users/13409860/",
            MIN_PRICE: 600,      // Минимальная цена за любой подарок в рублях
            MARKUP_FACTOR: 1.35,  // Наценка 35%
            TON_RATE: 138.5       // Актуальный курс TON
        };

        // База данных подарков с подготовленными путями под изображения
        const LOCAL_DATA = [
            { id: "instant_ramen", name: "Instant Ramen", tonPrice: 1.67 },
            { id: "snake_box", name: "Snake Box", tonPrice: 1.67 },
            { id: "xmas_stocking", name: "Xmas Stocking", tonPrice: 1.67 },
            { id: "lunar_snake", name: "Lunar Snake", tonPrice: 1.68 },
            { id: "candy_cane", name: "Candy Cane", tonPrice: 1.73 },
            { id: "whip_cupcake", name: "Whip Cupcake", tonPrice: 1.74 },
            { id: "vice_cream", name: "Vice Cream", tonPrice: 1.78 },
            { id: "chill_flame", name: "Chill Flame", tonPrice: 1.83 },
            { id: "hypno_lollipop", name: "Hypno Lollipop", tonPrice: 1.84 },
            { id: "holiday_drink", name: "Holiday Drink", tonPrice: 1.88 },
            { id: "ice_cream", name: "Ice Cream", tonPrice: 1.88 },
            { id: "big_year", name: "Big Year", tonPrice: 1.91 },
            { id: "star_notepad", name: "Star Notepad", tonPrice: 1.95 },
            { id: "jester_hat", name: "Jester Hat", tonPrice: 1.98 },
            { id: "pet_snake", name: "Pet Snake", tonPrice: 1.99 },
            { id: "easter_egg", name: "Easter Egg", tonPrice: 2.00 },
            { id: "party_sparkler", name: "Party Sparkler", tonPrice: 2.00 },
            { id: "fresh_socks", name: "Fresh Socks", tonPrice: 2.01 },
            { id: "tama_gadget", name: "Tama Gadget", tonPrice: 2.08 },
            { id: "winter_wreath", name: "Winter Wreath", tonPrice: 2.09 },
            { id: "hex_pot", name: "Hex Pot", tonPrice: 2.11 },
            { id: "happy_brownie", name: "Happy Brownie", tonPrice: 2.14 },
            { id: "pool_float", name: "Pool Float", tonPrice: 2.16 },
            { id: "ginger_cookie", name: "Ginger Cookie", tonPrice: 2.29 },
            { id: "stellar_rocket", name: "Stellar Rocket", tonPrice: 2.29 },
            { id: "b_day_candle", name: "B-Day Candle", tonPrice: 2.43 },
            { id: "santa_hat", name: "Santa Hat", tonPrice: 2.44 },
            { id: "lol_pop", name: "Lol Pop", tonPrice: 2.46 },
            { id: "spiced_wine", name: "Spiced Wine", tonPrice: 2.49 },
            { id: "mood_pack", name: "Mood Pack", tonPrice: 2.54 },
            { id: "clover_pin", name: "Clover Pin", tonPrice: 2.58 },
            { id: "pretty_posy", name: "Pretty Posy", tonPrice: 2.62 },
            { id: "mousse_cake", name: "Mousse Cake", tonPrice: 2.65 },
            { id: "restless_jar", name: "Restless Jar", tonPrice: 2.65 },
            { id: "bow_tie", name: "Bow Tie", tonPrice: 2.70 },
            { id: "input_key", name: "Input Key", tonPrice: 2.77 },
            { id: "cookie_heart", name: "Cookie Heart", tonPrice: 2.78 },
            { id: "jack_in_the_box", name: "Jack-in-the-Box", tonPrice: 2.78 },
            { id: "timeless_book", name: "Timeless Book", tonPrice: 2.78 },
            { id: "victory_medal", name: "Victory Medal", tonPrice: 2.79 },
            { id: "homemade_cake", name: "Homemade Cake", tonPrice: 2.84 },
            { id: "money_pot", name: "Money Pot", tonPrice: 2.85 },
            { id: "light_sword", name: "Light Sword", tonPrice: 2.96 },
            { id: "snow_mittens", name: "Snow Mittens", tonPrice: 2.98 },
            { id: "snoop_dogg", name: "Snoop Dogg", tonPrice: 3.04 },
            { id: "lush_bouquet", name: "Lush Bouquet", tonPrice: 3.10 },
            { id: "moon_pendant", name: "Moon Pendant", tonPrice: 3.16 },
            { id: "snow_globe", name: "Snow Globe", tonPrice: 3.25 },
            { id: "spring_basket", name: "Spring Basket", tonPrice: 3.35 },
            { id: "swag_bag", name: "Swag Bag", tonPrice: 3.35 },
            { id: "faith_amulet", name: "Faith Amulet", tonPrice: 3.36 },
            { id: "witch_hat", name: "Witch Hat", tonPrice: 3.48 },
            { id: "eternal_candle", name: "Eternal Candle", tonPrice: 3.49 },
            { id: "spy_agaric", name: "Spy Agaric", tonPrice: 3.49 },
            { id: "desk_calendar", name: "Desk Calendar", tonPrice: 3.70 },
            { id: "evil_eye", name: "Evil Eye", tonPrice: 4.08 },
            { id: "bunny_muffin", name: "Bunny Muffin", tonPrice: 4.49 },
            { id: "jolly_chimp", name: "Jolly Chimp", tonPrice: 4.61 },
            { id: "joyful_bundle", name: "Joyful Bundle", tonPrice: 4.69 },
            { id: "jelly_bunny", name: "Jelly Bunny", tonPrice: 5.00 },
            { id: "jingle_bells", name: "Jingle Bells", tonPrice: 5.48 },
            { id: "hanging_star", name: "Hanging Star", tonPrice: 5.88 },
            { id: "sleigh_bell", name: "Sleigh Bell", tonPrice: 6.07 },
            { id: "berry_box", name: "Berry Box", tonPrice: 6.40 },
            { id: "love_candle", name: "Love Candle", tonPrice: 6.50 },
            { id: "valentine_box", name: "Valentine Box", tonPrice: 6.55 },
            { id: "sakura_flower", name: "Sakura Flower", tonPrice: 7.36 },
            { id: "flying_broom", name: "Flying Broom", tonPrice: 7.59 },
            { id: "crystal_ball", name: "Crystal Ball", tonPrice: 7.61 },
            { id: "top_hat", name: "Top Hat", tonPrice: 7.88 },
            { id: "record_player", name: "Record Player", tonPrice: 7.94 }
        ];

        let APP_STATE = {
            rawItems: LOCAL_DATA,
            minCalculatedPrice: 0,
            maxCalculatedPrice: 0
        };

        const domCatalog = document.getElementById('catalog-view');
        const domCounter = document.getElementById('counter-text');
        const domSearch = document.getElementById('search-input');
        const domPriceRange = document.getElementById('price-range');
        const domPriceLimitVal = document.getElementById('price-limit-val');
        const domSort = document.getElementById('sort-select');
        const domReset = document.getElementById('btn-reset-all');

        // Функция расчёта рублёвой стоимости по твоей новой формуле
        function calculateFinalRubPrice(tonPrice) {
            const calculated = Math.ceil((tonPrice * CONFIG.TON_RATE) * CONFIG.MARKUP_FACTOR);
            // Если расчётная цена меньше 600 рублей, жёстко приравниваем её к 600
            return calculated < CONFIG.MIN_PRICE ? CONFIG.MIN_PRICE : calculated;
        }

        function initApp() {
            calibratePriceSlider();
            executeFiltering();

            domSearch.addEventListener('input', executeFiltering);
            domPriceRange.addEventListener('input', handleSliderMovement);
            domPriceRange.addEventListener('change', executeFiltering);
            domSort.addEventListener('change', executeFiltering);
            domReset.addEventListener('click', clearFormFilters);
        }

        function calibratePriceSlider() {
            const calculatedPrices = APP_STATE.rawItems.map(item => calculateFinalRubPrice(item.tonPrice));

            APP_STATE.minCalculatedPrice = Math.min(...calculatedPrices);
            APP_STATE.maxCalculatedPrice = Math.max(...calculatedPrices);

            domPriceRange.min = APP_STATE.minCalculatedPrice;
            domPriceRange.max = APP_STATE.maxCalculatedPrice;
            domPriceRange.value = APP_STATE.maxCalculatedPrice;
            domPriceLimitVal.textContent = APP_STATE.maxCalculatedPrice.toLocaleString('ru-RU');
        }

        function handleSliderMovement() {
            domPriceLimitVal.textContent = parseInt(domPriceRange.value).toLocaleString('ru-RU');
        }

        function executeFiltering() {
            const query = domSearch.value.toLowerCase().trim();
            const chosenMaxPrice = parseInt(domPriceRange.value);
            const sortOrder = domSort.value;

            let filteredDataSet = APP_STATE.rawItems.filter(item => {
                const finalRubPrice = calculateFinalRubPrice(item.tonPrice);
                
                const matchQuery = !query || item.name.toLowerCase().includes(query);
                const matchPrice = finalRubPrice <= chosenMaxPrice;

                return matchQuery && matchPrice;
            });

            filteredDataSet.sort((a, b) => {
                const priceA = calculateFinalRubPrice(a.tonPrice);
                const priceB = calculateFinalRubPrice(b.tonPrice);
                
                return sortOrder === 'asc' ? priceA - priceB : priceB - priceA;
            });

            renderShowcaseView(filteredDataSet);
        }

        function renderShowcaseView(dataset) {
            domCatalog.innerHTML = '';
            domCounter.textContent = `Всего подарков найдено: ${dataset.length}`;

            if (dataset.length === 0) {
                domCatalog.innerHTML = `
                    <div class="state-container">
                        Подарков по заданным критериям не найдено.
                    </div>`;
                return;
            }

            dataset.forEach(item => {
                const finalRubPrice = calculateFinalRubPrice(item.tonPrice);
                
                // Стабильный обход CORS для картинок через CDN гитхаба
                const cdnImageUrl = `https://raw.githubusercontent.com/portals-to/assets/main/items/${item.id}/image.png`;

                const cardNode = document.createElement('div');
                cardNode.className = 'card';
                
                cardNode.innerHTML = `
                    <div class="img-container">
                        <img src="${cdnImageUrl}" alt="${item.name}" onerror="this.onerror=null; this.src='https://images.unsplash.com/photo-1549465220-1a8b9238cd48?w=300&q=80';" loading="lazy">
                    </div>
                    <div class="card-content">
                        <div class="type-badge">GIFT</div>
                        <div class="item-title">${item.name}</div>
                        <div class="price-row">
                            <div class="price-rub">${finalRubPrice.toLocaleString('ru-RU')} ₽</div>
                        </div>
                        <a href="${CONFIG.FUNPAY_PROFILE}" target="_blank" class="btn-buy">Купить на FunPay</a>
                    </div>
                `;
                domCatalog.appendChild(cardNode);
            });
        }

        function clearFormFilters() {
            domSearch.value = '';
            domSort.value = 'asc';
            domPriceRange.value = APP_STATE.maxCalculatedPrice;
            domPriceLimitVal.textContent = APP_STATE.maxCalculatedPrice.toLocaleString('ru-RU');
            executeFiltering();
        }

        document.addEventListener("DOMContentLoaded", initApp);
    </script>
</body>
</html>
