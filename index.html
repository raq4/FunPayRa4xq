<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Gifts Showcase</title>
    <style>
        :root {
            --bg-main: #1c1212; /* Темный кастомный фон сайта */
            --bg-panel: #261919;
            --bg-input: #362525;
            --accent: #f43f5e; /* Розовый неон для рамок */
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #4ade80;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 30px 20px;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* Панель фильтров */
        .filter-panel {
            background-color: var(--bg-panel);
            border: 1px solid rgba(244, 63, 94, 0.2);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .search-bar {
            display: flex;
            gap: 12px;
        }

        .search-bar input {
            flex: 1;
            background-color: var(--bg-input);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.95rem;
            outline: none;
        }

        .search-bar input:focus {
            border-color: var(--accent);
        }

        .btn-clear {
            background-color: #dc2626;
            color: #ffffff;
            border: none;
            padding: 0 20px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        .filters-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filter-group label {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .filter-group select {
            background-color: var(--bg-input);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 12px;
            border-radius: 6px;
            outline: none;
            cursor: pointer;
        }

        .slider-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-grow: 1;
            max-width: 400px;
        }

        .slider-wrapper input[type="range"] {
            flex: 1;
            accent-color: var(--accent);
        }

        .status-text {
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        /* Сетка каталога под стиль скрина */
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
        }

        /* КАРТОЧКА 1 В 1 КАК НА СКРИНЕ */
        .card {
            border: 4px solid #f29393; /* Светло-розовая толстая рамка */
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            aspect-ratio: 1 / 1.25; /* Пропорции карточки */
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: scale(1.02);
        }

        /* Номер подарка в правом верхнем углу */
        .gift-number {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            color: #ffffff;
            font-size: 0.75rem;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 20px;
            z-index: 2;
        }

        /* Контейнер картинки с узорчатым/цветным фоном */
        .img-container {
            width: 100%;
            height: 65%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .img-container img {
            max-width: 75%;
            max-height: 75%;
            object-fit: contain;
            z-index: 1;
        }

        /* Тёмная подложка с инфой внизу */
        .card-content {
            height: 35%;
            background-color: #18181c; /* Матово-черный блок */
            padding: 12px 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .item-title {
            font-size: 1.05rem;
            font-weight: bold;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-details {
            font-size: 0.75rem;
            color: #a1a1aa;
            line-height: 1.4;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .price-row {
            font-size: 1.25rem;
            font-weight: bold;
            color: #f29393; /* Розовый цвет цены как на скрине */
            margin-top: auto;
        }

        .state-container {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="container">
        <section class="filter-panel">
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Поиск подарка по названию...">
                <button class="btn-clear" id="btn-reset-all">Сбросить</button>
            </div>

            <div class="filters-row">
                <div class="filter-group slider-wrapper">
                    <label>Цена до:</label>
                    <input type="range" id="price-range" min="0" max="25000" step="10">
                    <span id="price-limit-val" style="color: var(--accent); font-weight: bold;">0</span> ₽
                </div>

                <div class="filter-group">
                    <label for="sort-select">Сортировка:</label>
                    <select id="sort-select">
                        <option value="asc">Сначала дешевле</option>
                        <option value="desc">Сначала дороже</option>
                    </select>
                </div>
            </div>
        </section>

        <div class="status-text" id="counter-text">Загрузка витрины...</div>

        <main class="catalog-grid" id="catalog-view"></main>
    </div>

    <script>
        const CONFIG = {
            FUNPAY_PROFILE: "https://funpay.com/users/13409860/",
            MIN_PRICE: 600,       // Твоя минималка
            MARKUP_FACTOR: 1.35,  // 35% наценка
            TON_RATE: 138.5       // Курс TON
        };

        // База данных с номерами, моделями, фонами и цветами карточек из оригинального пула
        const LOCAL_DATA = [
            { id: "instant_ramen", name: "Instant Ramen", number: "215984", model: "Ratatouille", bgName: "Coral Red", bgColor: "#b45309", tonPrice: 1.67, assetId: "9139335624707936111" },
            { id: "instant_ramen", name: "Instant Ramen", number: "117378", model: "Ratatouille", bgName: "Cappuccino", bgColor: "#78350f", tonPrice: 1.67, assetId: "9139335624707936111" },
            { id: "instant_ramen", name: "Instant Ramen", number: "113655", model: "Cable Mess", bgName: "Satin Gold", bgColor: "#6b5a32", tonPrice: 1.67, assetId: "9139335624707936111" },
            { id: "instant_ramen", name: "Instant Ramen", number: "71247", model: "Ratatouille", bgName: "Cobalt Blue", bgColor: "#1e3a8a", tonPrice: 1.67, assetId: "9139335624707936111" },
            { id: "instant_ramen", name: "Instant Ramen", number: "296021", model: "Ratatouille", bgName: "Battleship Grey", bgColor: "#4b5563", tonPrice: 1.67, assetId: "9139335624707936111" },
            { id: "instant_ramen", name: "Instant Ramen", number: "22549", model: "Ratatouille", bgName: "Pure Gold", bgColor: "#854d0e", tonPrice: 1.67, assetId: "9139335624707936111" },
            { id: "xmas_stocking", name: "Xmas Stocking", number: "86160", model: "Lavender", bgName: "Burnt Sienna", bgColor: "#7c2d12", tonPrice: 1.67, assetId: "5423545163351912255" },
            { id: "snake_box", name: "Snake Box", number: "173536", model: "Red Dash", bgName: "Amber", bgColor: "#92400e", tonPrice: 1.67, assetId: "5341355421523412532" },
            { id: "lunar_snake", name: "Lunar Snake", number: "196301", model: "Classic", bgName: "Crimson", bgColor: "#991b1b", tonPrice: 1.68, assetId: "5213421523125213511" },
            { id: "candy_cane", name: "Candy Cane", number: "220912", model: "Sweet Mint", bgName: "Emerald", bgColor: "#065f46", tonPrice: 1.73, assetId: "5412512521321523111" },
            { id: "whip_cupcake", name: "Whip Cupcake", number: "274205", model: "Creamy", bgName: "Violet", bgColor: "#5b21b6", tonPrice: 1.74, assetId: "5125213125213512311" },
            { id: "pet_snake", name: "Pet Snake", number: "184511", model: "Snake Dance", bgName: "Indigo", bgColor: "#3730a3", tonPrice: 1.99, assetId: "5125125123215123512" },
            { id: "jester_hat", name: "Jester Hat", number: "140112", model: "Circus", bgName: "Cyan", bgColor: "#155e75", tonPrice: 1.98, assetId: "5125125132151235212" },
            { id: "top_hat", name: "Top Hat", number: "34301", model: "Gentleman", bgName: "Charcoal", bgColor: "#1f2937", tonPrice: 7.88, assetId: "5123512512312512351" }
        ];

        let APP_STATE = { items: LOCAL_DATA };

        const domCatalog = document.getElementById('catalog-view');
        const domCounter = document.getElementById('counter-text');
        const domSearch = document.getElementById('search-input');
        const domPriceRange = document.getElementById('price-range');
        const domPriceLimitVal = document.getElementById('price-limit-val');
        const domSort = document.getElementById('sort-select');
        const domReset = document.getElementById('btn-reset-all');

        function calculateFinalRubPrice(tonPrice) {
            const calculated = Math.ceil((tonPrice * CONFIG.TON_RATE) * CONFIG.MARKUP_FACTOR);
            return calculated < CONFIG.MIN_PRICE ? CONFIG.MIN_PRICE : calculated;
        }

        function initApp() {
            const prices = APP_STATE.items.map(item => calculateFinalRubPrice(item.tonPrice));
            domPriceRange.max = Math.max(...prices);
            domPriceRange.value = Math.max(...prices);
            domPriceLimitVal.textContent = Math.max(...prices).toLocaleString('ru-RU');

            executeFiltering();

            domSearch.addEventListener('input', executeFiltering);
            domPriceRange.addEventListener('input', () => domPriceLimitVal.textContent = parseInt(domPriceRange.value).toLocaleString('ru-RU'));
            domPriceRange.addEventListener('change', executeFiltering);
            domSort.addEventListener('change', executeFiltering);
            domReset.addEventListener('click', () => {
                domSearch.value = '';
                domPriceRange.value = domPriceRange.max;
                domPriceLimitVal.textContent = domPriceRange.max;
                domSort.value = 'asc';
                executeFiltering();
            });
        }

        function executeFiltering() {
            const query = domSearch.value.toLowerCase().trim();
            const chosenMaxPrice = parseInt(domPriceRange.value);
            const sortOrder = domSort.value;

            let filtered = APP_STATE.items.filter(item => {
                const price = calculateFinalRubPrice(item.tonPrice);
                return (!query || item.name.toLowerCase().includes(query)) && price <= chosenMaxPrice;
            });

            filtered.sort((a, b) => {
                const pA = calculateFinalRubPrice(a.tonPrice);
                const pB = calculateFinalRubPrice(b.tonPrice);
                return sortOrder === 'asc' ? pA - pB : pB - pA;
            });

            renderShowcaseView(filtered);
        }

        function renderShowcaseView(dataset) {
            domCatalog.innerHTML = '';
            domCounter.textContent = `Всего предметов: ${dataset.length}`;

            if (dataset.length === 0) {
                domCatalog.innerHTML = `<div class="state-container">Подарков не найдено</div>`;
                return;
            }

            dataset.forEach(item => {
                const finalPrice = calculateFinalRubPrice(item.tonPrice);
                
                // Стабильные статические изображения из официального репозитория Telegram assets
                const imgUrl = `https://raw.githubusercontent.com/telegramdesktop/tdesktop/master/Telegram/Resources/tgclicks/gifts/${item.id}.png`;

                const cardNode = document.createElement('a');
                cardNode.href = CONFIG.FUNPAY_PROFILE;
                cardNode.target = "_blank";
                cardNode.className = 'card';
                
                cardNode.innerHTML = `
                    <div class="gift-number">#${item.number}</div>
                    <div class="img-container" style="background-color: ${item.bgColor || '#2d1a1a'}">
                        <img src="${imgUrl}" alt="${item.name}" onerror="this.onerror=null; this.src='https://raw.githubusercontent.com/portals-to/assets/main/items/${item.id}/image.png';">
                    </div>
                    <div class="card-content">
                        <div>
                            <div class="item-title">${item.name}</div>
                            <div class="item-details">
                                <div>Модель: ${item.model}</div>
                                <div>Фон: ${item.bgName}</div>
                            </div>
                        </div>
                        <div class="price-row">${finalPrice.toLocaleString('ru-RU')} ₽</div>
                    </div>
                `;
                domCatalog.appendChild(cardNode);
            });
        }

        document.addEventListener("DOMContentLoaded", initApp);
    </script>
</body>
</html>
