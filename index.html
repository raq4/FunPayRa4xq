<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FunPayRa4xq — Витрина подарков</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #38bdf8;
            --price-color: #4ade80;
            --filter-bg: #334155;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.3rem;
            margin-bottom: 5px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .filters-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            width: 100%;
            max-width: 1200px;
            margin-bottom: 20px;
            padding: 15px;
            background-color: var(--card-bg);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-sizing: border-box;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 160px;
        }

        .filter-group label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 5px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .filter-group select {
            background-color: var(--filter-bg);
            color: var(--text-color);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            cursor: pointer;
        }

        .stats {
            width: 100%;
            max-width: 1200px;
            margin-bottom: 15px;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(56, 189, 248, 0.15);
        }

        .img-container {
            width: 100%;
            padding-top: 100%;
            position: relative;
            background: radial-gradient(circle, rgba(56,189,248,0.1) 0%, rgba(0,0,0,0) 70%);
        }

        .img-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 15px;
            box-sizing: border-box;
        }

        .info {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .number {
            font-size: 0.85rem;
            color: var(--accent-color);
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .name {
            font-size: 1.15rem;
            font-weight: bold;
            margin-bottom: 15px;
            line-height: 1.3;
        }

        .price-container {
            margin-top: auto;
            margin-bottom: 15px;
        }

        .price {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--price-color);
        }

        .price::after {
            content: ' ₽';
            font-size: 1.1rem;
        }

        .ton-price {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .btn-buy {
            display: block;
            width: 100%;
            padding: 12px 0;
            background-color: var(--accent-color);
            color: var(--bg-color);
            text-align: center;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .btn-buy:hover {
            background-color: #7dd3fc;
        }

        .loading, .error {
            font-size: 1.2rem;
            color: var(--text-muted);
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px 0;
        }
    </style>
</head>
<body>

    <header>
        <h1>FunPayRa4xq Marketplace</h1>
    </header>

    <section class="filters-panel">
        <div class="filter-group">
            <label for="filter-model">Model</label>
            <select id="filter-model">
                <option value="all">All Models</option>
            </select>
        </div>
        <div class="filter-group">
            <label for="filter-back">Back</label>
            <select id="filter-back">
                <option value="all">All Backs</option>
            </select>
        </div>
        <div class="filter-group">
            <label for="filter-symbol">Symbol</label>
            <select id="filter-symbol">
                <option value="all">All Symbols</option>
            </select>
        </div>
    </section>

    <div class="stats" id="stats-counter">Загрузка информации...</div>

    <main class="grid" id="catalog">
        <div class="loading">Загрузка витрины предметов...</div>
    </main>

    <script>
        const FUNPAY_PROFILE = "https://funpay.com/users/13409860/"; 
        const TON_RATE = 138; 
        const MARKUP = 1.35;  
        const MAX_PRICE_TON = 9.0; // Строгий лимит до 9 TON

        // Интегрированные списки официальных атрибутов с Portals API
        const portalsData = {
            models: [
                "Instant Ramen", "Snake Box", "Xmas Stocking", "Lunar Snake", "Candy Cane", 
                "Whip Cupcake", "Vice Cream", "Chill Flame", "Hypno Lollipop", "Holiday Drink", 
                "Ice Cream", "Big Year", "Star Notepad", "Jester Hat", "Pet Snake", "Easter Egg", 
                "Party Sparkler", "Fresh Socks", "Tama Gadget", "Winter Wreath", "Hex Pot", 
                "Happy Brownie", "Pool Float", "Ginger Cookie", "Stellar Rocket", "B-Day Candle", 
                "Santa Hat", "Lol Pop", "Spiced Wine", "Mood Pack", "Clover Pin", "Pretty Posy", 
                "Mousse Cake", "Restless Jar", "Bow Tie", "Input Key", "Cookie Heart", 
                "Jack-in-the-Box", "Timeless Book", "Victory Medal", "Homemade Cake", "Money Pot", 
                "Light Sword", "Snow Mittens", "Snoop Dogg", "Lush Bouquet", "Moon Pendant", 
                "Snow Globe", "Spring Basket", "Swag Bag", "Faith Amulet", "Witch Hat", 
                "Eternal Candle", "Spy Agaric", "Desk Calendar", "Evil Eye", "Bunny Muffin", 
                "Jolly Chimp", "Joyful Bundle", "Jelly Bunny", "Jingle Bells", "Hanging Star", 
                "Sleigh Bell", "Berry Box", "Love Candle", "Valentine Box", "Sakura Flower", 
                "Flying Broom", "Crystal Ball", "Top Hat", "Record Player"
            ],
            backs: ["Black", "Blue", "Green", "Pink", "Purple", "Red", "Gold", "White", "Yellow", "Orange", "Gray", "Aqua"],
            symbols: ["Heart", "Star", "Diamond", "Club", "Spade", "Trophy", "None"]
        };

        const catalog = document.getElementById('catalog');
        const statsCounter = document.getElementById('stats-counter');
        
        const selectModel = document.getElementById('filter-model');
        const selectBack = document.getElementById('filter-back');
        const selectSymbol = document.getElementById('filter-symbol');

        let allItems = []; 

        // Инициализация списков фильтров при старте страницы
        function initFilterSelects() {
            portalsData.models.sort().forEach(m => {
                const opt = document.createElement('option');
                opt.value = m.toLowerCase();
                opt.textContent = m;
                selectModel.appendChild(opt);
            });
            portalsData.backs.sort().forEach(b => {
                const opt = document.createElement('option');
                opt.value = b.toLowerCase();
                opt.textContent = b;
                selectBack.appendChild(opt);
            });
            portalsData.symbols.sort().forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.toLowerCase();
                opt.textContent = s;
                selectSymbol.appendChild(opt);
            });
        }

        initFilterSelects();

        fetch('market_data.json')
            .then(response => {
                if (!response.ok) throw new Error('Ошибка при загрузке JSON');
                return response.json();
            })
            .then(data => {
                if (!data.results || data.results.length === 0) {
                    catalog.innerHTML = '<div class="loading">Нет доступных предметов в market_data.json</div>';
                    return;
                }

                // Жесткий фильтр: оставляем на сайте только подарки со скринов (до 9 TON)
                allItems = data.results.filter(item => parseFloat(item.price) <= MAX_PRICE_TON);
                
                renderCatalog(allItems);

                [selectModel, selectBack, selectSymbol].forEach(select => {
                    select.addEventListener('change', filterProducts);
                });
            })
            .catch(err => {
                console.error(err);
                catalog.innerHTML = '<div class="error">Не удалось загрузить витрину. Проверьте маркет-данные.</div>';
            });

        function renderCatalog(items) {
            catalog.innerHTML = '';
            statsCounter.textContent = `Найдено предметов: ${items.length}`;

            if (items.length === 0) {
                catalog.innerHTML = '<div class="loading">Нет предметов, соответствующих выбранным фильтрам.</div>';
                return;
            }

            items.forEach(item => {
                const originalPriceTON = parseFloat(item.price);
                const finalPriceRUB = Math.round(originalPriceTON * TON_RATE * MARKUP);

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="img-container">
                        <img src="${item.photo_url}" alt="${item.name}" loading="lazy">
                    </div>
                    <div class="info">
                        <div class="number">#${item.external_collection_number || 'NFT'}</div>
                        <div class="name">${item.name}</div>
                        <div class="price-container">
                            <div class="price">${finalPriceRUB}</div>
                            <div class="ton-price">Оригинал: ${originalPriceTON} TON</div>
                        </div>
                        <a href="${FUNPAY_PROFILE}" target="_blank" class="btn-buy">Купить на FunPay</a>
                    </div>
                `;
                catalog.appendChild(card);
            });
        }

        // Продвинутый маппинг фильтрации по официальной базе Portals
        function filterProducts() {
            const chosenModel = selectModel.value;
            const chosenBack = selectBack.value;
            const chosenSymbol = selectSymbol.value;

            const filtered = allItems.filter(item => {
                const itemName = item.name.toLowerCase();
                
                // Проверка модели
                const matchModel = (chosenModel === 'all' || itemName.includes(chosenModel));
                // Проверка фона
                const matchBack = (chosenBack === 'all' || itemName.includes(chosenBack));
                // Проверка символа
                const matchSymbol = (chosenSymbol === 'all' || itemName.includes(chosenSymbol));

                return matchModel && matchBack && matchSymbol;
            });

            renderCatalog(filtered);
        }
    </script>

</body>
</html>
