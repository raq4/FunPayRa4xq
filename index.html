<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portals Showcase — Gifts Market</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --accent: #38bdf8;
            --accent-hover: #7dd3fc;
            --success: #4ade80;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--accent), #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .rate-badge {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .rate-badge span {
            color: var(--success);
        }

        .filter-panel {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .search-bar {
            display: flex;
            gap: 12px;
        }

        .search-bar input {
            flex: 1;
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-bar input:focus {
            border-color: var(--accent);
        }

        .btn-clear {
            background-color: #dc2626;
            color: #ffffff;
            border: none;
            padding: 0 24px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-clear:hover {
            background-color: #b91c1c;
        }

        .filters-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            align-items: end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-group label {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .filter-group select {
            background-color: var(--bg-input);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            cursor: pointer;
        }

        .slider-wrapper {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .slider-outputs {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .slider-outputs span span {
            color: var(--accent);
            font-weight: 700;
        }

        .filter-group input[type="range"] {
            width: 100%;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .status-text {
            font-size: 1rem;
            color: var(--text-muted);
        }

        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px;
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(56, 189, 248, 0.12);
        }

        .img-container {
            width: 100%;
            padding-top: 100%;
            position: relative;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.05) 0%, rgba(0,0,0,0) 70%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .img-container img, .img-container svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 24px;
        }

        .img-container svg {
            fill: var(--accent);
            opacity: 0.8;
        }

        .card-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .type-badge {
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--accent);
            background-color: rgba(56, 189, 248, 0.1);
            padding: 4px 8px;
            border-radius: 6px;
            align-self: flex-start;
            margin-bottom: 12px;
        }

        .item-title {
            font-size: 1.15rem;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 16px;
            min-height: 2.8rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .price-row {
            margin-top: auto;
            margin-bottom: 16px;
        }

        .price-rub {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--success);
        }

        .price-ton {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .btn-buy {
            display: block;
            width: 100%;
            background-color: var(--accent);
            color: #0f172a;
            text-align: center;
            padding: 14px 0;
            border-radius: 10px;
            font-weight: 700;
            text-decoration: none;
            font-size: 1rem;
            transition: background-color 0.2s;
        }

        .btn-buy:hover {
            background-color: var(--accent-hover);
        }

        .state-container {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
            font-size: 1.2rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Portals Showcase</h1>
            <div class="rate-badge">Курс TON (Bitget): <span id="ton-rate-val">138.5 ₽</span></div>
        </header>

        <section class="filter-panel">
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Введите название подарка для мгновенного поиска...">
                <button class="btn-clear" id="btn-reset-all">Сбросить всё</button>
            </div>

            <div class="filters-row">
                <div class="filter-group slider-wrapper">
                    <div class="slider-outputs">
                        <label>Фильтр по цене</label>
                        <span>до: <span id="price-limit-val">0</span> ₽</span>
                    </div>
                    <input type="range" id="price-range" min="0" max="10000" step="1">
                </div>

                <div class="filter-group">
                    <label for="sort-select">Сортировка цены</label>
                    <select id="sort-select">
                        <option value="asc">Сначала дешевле</option>
                        <option value="desc">Сначала дороже</option>
                    </select>
                </div>
            </div>
        </section>

        <div class="status-text" id="counter-text">Инициализация витрины...</div>

        <main class="catalog-grid" id="catalog-view">
            <div class="state-container">Загрузка подарков...</div>
        </main>
    </div>

    <script>

            { id: "g64", name: "Berry Box", tonPrice: 6.40, type: "GIFT" },
            { id: "g65", name: "Love Candle", tonPrice: 6.50, type: "GIFT" },
            { id: "g66", name: "Valentine Box", tonPrice: 6.55, type: "GIFT" },
            { id: "g67", name: "Sakura Flower", tonPrice: 7.36, type: "GIFT" },
            { id: "g68", name: "Flying Broom", tonPrice: 7.59, type: "GIFT" },
            { id: "g69", name: "Crystal Ball", tonPrice: 7.61, type: "GIFT" },
            { id: "g70", name: "Top Hat", tonPrice: 7.88, type: "GIFT" },
            { id: "g71", name: "Record Player", tonPrice: 7.94, type: "GIFT" }
        ];

        let APP_STATE = {
            rawItems: LOCAL_DATA,
            minCalculatedPrice: 0,
            maxCalculatedPrice: 0
        };

        const domCatalog = document.getElementById('catalog-view');
        const domCounter = document.getElementById('counter-text');
        const domSearch = document.getElementById('search-input');
        const domPriceRange = document.getElementById('price-range');
        const domPriceLimitVal = document.getElementById('price-limit-val');
        const domSort = document.getElementById('sort-select');
        const domReset = document.getElementById('btn-reset-all');

        // Шаблон дефолтной иконки подарка (SVG), чтобы избежать битых картинок с вопросительным знаком
        const GIFT_SVG = `
            <svg viewBox="0 0 24 24">
                <path d="M20 6h-2.18c.11-.31.18-.65.18-1 0-1.66-1.34-3-3-3-1.05 0-1.96.54-2.5 1.35-.54-.81-1.45-1.35-2.5-1.35-1.66 0-3 1.34-3 3 0 .35.07.69.18 1H5c-1.1 0-2 .9-2 2v3c0 .55.45 1 1 1h1v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V11h1c.55 0 1-.45 1-1V8c0-1.1-.9-2-2-2zM15 4c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm-6 1c0-.55.45-1 1-1s1 .45 1 1-.45 1-1 1-1-.45-1-1zM5 8h14v2H5V8zm12 12H7V11h10v9z"/>
            </svg>`;

        function initApp() {
            calibratePriceSlider();
            executeFiltering();

            domSearch.addEventListener('input', executeFiltering);
            domPriceRange.addEventListener('input', handleSliderMovement);
            domPriceRange.addEventListener('change', executeFiltering);
            domSort.addEventListener('change', executeFiltering);
            domReset.addEventListener('click', clearFormFilters);
        }

        function calibratePriceSlider() {
            const calculatedPrices = APP_STATE.rawItems.map(item => 
                Math.ceil((item.tonPrice * CONFIG.TON_RATE) * CONFIG.MARKUP_FACTOR)
            );

            APP_STATE.minCalculatedPrice = Math.min(...calculatedPrices);
            APP_STATE.maxCalculatedPrice = Math.max(...calculatedPrices);

            domPriceRange.min = APP_STATE.minCalculatedPrice;
            domPriceRange.max = APP_STATE.maxCalculatedPrice;
            domPriceRange.value = APP_STATE.maxCalculatedPrice;
            domPriceLimitVal.textContent = APP_STATE.maxCalculatedPrice.toLocaleString('ru-RU');
        }

        function handleSliderMovement() {
            domPriceLimitVal.textContent = parseInt(domPriceRange.value).toLocaleString('ru-RU');
        }

        function executeFiltering() {
            const query = domSearch.value.toLowerCase().trim();
            const chosenMaxPrice = parseInt(domPriceRange.value);
            const sortOrder = domSort.value;

            // 1. Фильтрация по поиску и максимальной цене
            let filteredDataSet = APP_STATE.rawItems.filter(item => {
                const finalRubPrice = Math.ceil((item.tonPrice * CONFIG.TON_RATE) * CONFIG.MARKUP_FACTOR);
                
                const matchQuery = !query || item.name.toLowerCase().includes(query);
                const matchPrice = finalRubPrice <= chosenMaxPrice;

                return matchQuery && matchPrice;
            });

            // 2. Сортировка цены (Дешевле / Дороже)
            filteredDataSet.sort((a, b) => {
                const priceA = Math.ceil((a.tonPrice * CONFIG.TON_RATE) * CONFIG.MARKUP_FACTOR);
                const priceB = Math.ceil((b.tonPrice * CONFIG.TON_RATE) * CONFIG.MARKUP_FACTOR);
                
                return sortOrder === 'asc' ? priceA - priceB : priceB - priceA;
            });

            renderShowcaseView(filteredDataSet);
        }

        function renderShowcaseView(dataset) {
            domCatalog.innerHTML = '';
            domCounter.textContent = `Всего подарков найдено: ${dataset.length}`;

            if (dataset.length === 0) {
                domCatalog.innerHTML = `
                    <div class="state-container">
                        Подарков с такими критериями цены или названия не найдено.
                    </div>`;
                return;
            }

            dataset.forEach(item => {
                const finalRubPrice = Math.ceil((item.tonPrice * CONFIG.TON_RATE) * CONFIG.MARKUP_FACTOR);

                const cardNode = document.createElement('div');
                cardNode.className = 'card';
                
                // Используем SVG шаблон вместо заглушек, чтобы убрать знаки вопроса
                cardNode.innerHTML = `
                    <div class="img-container">
                        ${GIFT_SVG}
                    </div>
                    <div class="card-content">
                        <div class="type-badge">${item.type}</div>
                        <div class="item-title">${item.name}</div>
                        <div class="price-row">
                            <div class="price-rub">${finalRubPrice.toLocaleString('ru-RU')} ₽</div>
                            <div class="price-ton">База: ${item.tonPrice} TON</div>
                        </div>
                        <a href="${CONFIG.FUNPAY_PROFILE}" target="_blank" class="btn-buy">Купить на FunPay</a>
                    </div>
                `;
                domCatalog.appendChild(cardNode);
            });
        }

        function clearFormFilters() {
            domSearch.value = '';
            domSort.value = 'asc';
            domPriceRange.value = APP_STATE.maxCalculatedPrice;
            domPriceLimitVal.textContent = APP_STATE.maxCalculatedPrice.toLocaleString('ru-RU');
            executeFiltering();
        }

        document.addEventListener("DOMContentLoaded", initApp);
    </script>
</body>
</html>
